const WEEK_LECTURES = [
  {
    id: 1,
    title: "The Regulatory Foundation of Government Contracts",
    duration: "~22 min",
    script: `Good morning and welcome to your first week of GovCon study. This week we are laying the foundation — the regulatory architecture that governs every single government contract in this country. By the end of this lecture, you will understand where the law comes from, how it is structured, and why government contracting is so different from everything you have done before.

Let us start with the most important fact about government contracts: the government is not a private party. When you represent a contractor doing business with a private company, you look at the contract, you apply general common law principles, and you advise your client. Government contracting is completely different. The government operates under statutory and regulatory authority. It can only spend money Congress has appropriated. It can only buy things in the ways Congress and executive agencies have authorized. And it can only be bound by people who have legal authority to bind it. Everything flows from those three constraints.

The center of gravity in federal procurement law is the Federal Acquisition Regulation, universally called the FAR. The FAR is a joint regulation issued by the Department of Defense, the General Services Administration, and NASA, but it applies to essentially all federal executive agencies. Think of it as the rulebook for how the federal government buys things. It tells agencies what they can buy, how they must compete for purchases, what contract clauses they must include, what contractors must certify, how disputes are resolved, and how contracts end. The FAR itself is approximately two thousand pages. When you add agency-specific supplements, you are well over five thousand pages. This is not something you read cover to cover. This is something you learn by part, by problem type, and by practice.

The FAR is organized into fifty-three numbered parts. A few parts you will use constantly. Part 1 lays out the purpose and guiding principles. Part 2 has the definitions — and definitions matter enormously in government contracting because terms like claim, contracting officer, and responsible have very specific legal meanings that differ from common usage. Part 9 covers contractor responsibility and organizational conflicts of interest. Part 12 covers commercial item acquisitions. Parts 13, 14, and 15 govern the three major acquisition methods we will discuss in a moment. Part 19 is the entire small business program framework. Part 22 covers labor law requirements like the Davis-Bacon Act. Part 31 sets out the cost principles that govern what costs a contractor can charge on cost-reimbursement contracts. Part 33 covers disputes and protests. Part 49 covers termination of contracts. And Part 52 contains the full text of hundreds of contract clauses that get incorporated into government contracts. When you represent a GovCon client, you will be in Part 52 constantly.

Now, on top of the FAR, each major agency has its own supplement. The most important is the Defense Federal Acquisition Regulation Supplement, called the DFARS. If you are doing any work involving the Department of Defense — and in Georgia, you will be, given our enormous defense presence — you need to understand the DFARS. It supplements the FAR with DoD-specific requirements, including specialized cybersecurity requirements, specialized small business requirements, and specialized cost accounting requirements. Other agencies have their own supplements as well. The General Services Administration has the GSAM. Veterans Affairs has the VAAR. NASA has the NFS. The point is that every time you look at a government contract, you start with the FAR, then identify the agency, and then check whether there is a supplement that modifies or adds to the FAR requirements for that agency. You cannot advise a client on a DoD contract by looking at FAR alone. You have to look at DFARS too.

Alongside the FAR and its supplements, there is a web of statutes that provide the underlying legal authority. The most important of these for daily practice are the following. First, the Competition in Contracting Act of 1984. This statute requires the federal government to use competitive procedures when acquiring goods and services. It is the foundation for bid protest law — the concept that disappointed bidders have legal remedies when the government conducts a procurement improperly. Second, the Contract Disputes Act of 1978. This is the statute that governs how a contractor brings a formal legal claim against the government after a dispute arises during contract performance. We will spend an entire week on this, but understand now that it is the procedural framework for essentially all post-award contractor litigation against the federal government. Third, the False Claims Act, originally signed by Abraham Lincoln during the Civil War and massively expanded since. The FCA is the government's primary tool for combating fraud in federal programs. It provides for treble damages, allows private citizens to sue on the government's behalf through qui tam actions, and creates a recovery mechanism that generated six point eight billion dollars in fiscal year 2025 alone. Every GovCon attorney must understand the FCA. Fourth, the Anti-Deficiency Act. This one is less visible to contractor-side lawyers but critical to understand: it prohibits federal agencies from spending money they have not been appropriated, committing to expenditures in advance of appropriations, or entering into contracts that would require spending beyond what has been authorized. When a government program runs out of funding mid-performance, the Anti-Deficiency Act is usually somewhere in the picture. And fifth, the Tucker Act, which waives the federal government's sovereign immunity to allow certain money claims to be brought against the United States in the Court of Federal Claims.

Now let us talk about how the government actually buys things. There are three main acquisition methods under the FAR, and they are defined by dollar value and complexity. The first is simplified acquisition under Part 13. This applies to purchases generally under two hundred and fifty thousand dollars. The procedures are streamlined, the competition requirements are lighter, and the process moves faster. Think of this as the government's quick-purchase lane. The second is sealed bidding under Part 14. In sealed bidding, the government issues an Invitation for Bids, all responsive bidders submit sealed prices, the government opens them publicly, and the award goes to the lowest responsive and responsible bidder. Price is the only evaluation criterion. There are no discussions, no negotiations, no subjective judgments about technical approach. This method is used when requirements are clear enough that price is the only meaningful differentiator. Construction contracts frequently use sealed bidding. The third and most complex method is negotiated procurement under Part 15. The government issues a Request for Proposals, offerors submit detailed proposals covering both technical approach and price, the government evaluates proposals against stated criteria, conducts discussions if it chooses to, requests final proposal revisions, and makes a best value award. This is where you will do the most legally complex work — proposal compliance, evaluation challenges, and bid protests.

Let us also talk about contract types, because they determine who bears the financial risk of performance. The fundamental divide is fixed-price versus cost-reimbursement. In a fixed-price contract, the contractor agrees to deliver the requirement for a specified price, regardless of what it actually costs. If costs run over, the contractor absorbs the loss. If costs come in under, the contractor keeps the profit. The contractor bears essentially all cost risk. The most common variant is the Firm Fixed Price contract, or FFP, which is the government's preferred contract type because it gives the contractor maximum incentive to be efficient. In a cost-reimbursement contract, the government agrees to reimburse the contractor for all allowable costs incurred in performance, plus a fee. The government bears the cost risk. Cost-reimbursement contracts are used when requirements are unclear, performance is uncertain, or it would be unfair to ask the contractor to price the risk. Between these two extremes are Time and Materials contracts — where the government pays a fixed hourly rate for labor plus actual material costs — and Indefinite Delivery Indefinite Quantity contracts, or IDIQs, which establish a framework agreement for a period of time with task orders issued as needs arise.

This week you are reading primary sources. You are going to acquisition.gov and reading the FAR directly. You are going to read actual statute text, not summaries. This is an important discipline in GovCon practice. The FAR is the primary authority, not a secondary commentary about it. When a client has a compliance question, you go to the regulation, not to a blog post about the regulation.

One last thought before your reflection question today. Government contracting is sometimes described as a specialty practice, but I want to push back on that framing. Yes, it has its own vocabulary, its own regulatory framework, and its own court system. But the underlying legal skills are the same ones you use everywhere — careful reading, statutory interpretation, procedural precision, and judgment about risk. What makes GovCon practitioners distinctive is not that they possess some exotic legal knowledge. It is that they have read the FAR carefully and repeatedly, they know the cases, and they understand the practical world of how contracting officers think and how agencies behave. That is what this ten-week program is building.

Your reflection question today: look at the FAR Table of Contents. Without using any outside source, predict which five FAR parts will appear most frequently in your practice. Write those five parts down and the reason for each prediction. You will revisit this list in week ten, and you will probably be surprised by how your answer changes.

Take good notes this week. The regulatory architecture you are learning is the skeleton of everything else. Goodbye and good luck today.`
  },
  {
    id: 2,
    title: "The Pre-Award Phase: Where Cases Are Won and Lost Before the Contract Exists",
    duration: "~21 min",
    script: `Good morning. This week we are covering the pre-award phase of the government contract lifecycle. I want to start with a statement that will orient everything you learn this week: the most important legal work in a government contract happens before the contract is signed. By the time a contract is awarded, many of the most critical decisions have already locked in. Requirements are set. Evaluation criteria are fixed. Potential protest grounds are either preserved or waived. Team structures are either properly formed or they are not. This week is about understanding that front end.

Let us start with how the government identifies what it needs. Before any solicitation goes out, an agency goes through a requirements development process. A program manager or an end-user identifies a need — maybe it is a new information system, maybe it is construction of a building, maybe it is professional services. That need gets translated into a written description of the work. The three primary formats are a Statement of Work, which is a detailed prescription of exactly what the contractor will do; a Performance Work Statement, which defines the outcomes the government wants and gives the contractor flexibility on how to achieve them; and a Statement of Objectives, which is even more flexible and invites offerors to propose their own solutions. This distinction matters because it affects how you evaluate the solicitation and how you advise your client on proposal strategy.

After requirements are developed, the agency conducts market research to understand what is commercially available and who the potential offerors are. This phase sometimes produces a Sources Sought notice on SAM.gov — a government posting asking small businesses whether they are capable of performing. The Sources Sought response is often the first interaction between a contractor and an agency on a particular opportunity, and for small businesses trying to get into a program, it is a critical touchpoint. Attorneys who advise small business GovCon clients need to understand this pre-solicitation phase because it affects eligibility, set-aside decisions, and who the final competitors will be.

Now the solicitation is issued. Let us talk about how solicitations are structured, because reading a solicitation is one of the most important skills you will develop. Federal solicitations are organized into sections designated by letters. The most important sections for legal review are Section L and Section M. Section L contains the instructions to offerors — what you must submit, in what format, by when, and how many pages. Section M contains the evaluation factors — how the government will score proposals, what the relative weights are, and what the award criteria are. Section C is the Statement of Work or Statement of Objectives. Section I contains the contract clauses. Section J contains attachments and exhibits. Section K contains representations and certifications — the legal certifications the contractor makes about itself, including size status, debarment status, and compliance with various statutes.

When a contractor walks into your office — or emails you, as happens far more often now — with a solicitation and asks what to do, your first job is to read Section L and Section M in detail and build what practitioners call a compliance matrix. A compliance matrix is a working document that maps every requirement in Section L to what the contractor must do. Column one is the section reference. Column two is the specific requirement. Column three is what the contractor needs to prepare or submit to satisfy that requirement. It is time-consuming but essential. The purpose is twofold. First, it ensures the contractor does not miss a requirement that leads to a proposal being declared non-responsive. Second, it surfaces what we call showstopper requirements early. A showstopper is a requirement that the contractor simply cannot meet. Davis-Bacon prevailing wage requirements. A specific security clearance level. A mandatory past performance threshold requiring three contracts over five million dollars in the relevant work. If you find a showstopper in week one before the client has invested resources in proposal preparation, you have done your job. If you find it on the night before proposal submission, you have failed the client.

I want to spend some time on a concept that is underappreciated by attorneys new to this area: the FOIA and Open Records Act implications of government proposals. Contractors put enormous amounts of proprietary information into their proposals — pricing strategies, cost structures, technical methodologies, key personnel resumes, past performance data. Most contractors do not think about what happens to that information after they submit the proposal. But under the Freedom of Information Act, a competitor can request the winning contractor's proposal, pricing data, and technical approach after contract award. Most solicitations provide a mechanism to designate certain information as trade secret or confidential commercial information, which provides protection under FOIA Exemption 4. But if a contractor does not make those designations at submission time, the protection is effectively waived. This is an area where attorneys add significant practical value — building a confidentiality designation practice into every proposal review.

We also need to discuss pre-award teaming. Large government contracts are frequently won by teams, not individual companies. A teaming agreement is a contract between a prime contractor and one or more subcontractors that binds them together for the purpose of pursuing a specific solicitation. It allocates work, establishes exclusivity, and defines the terms on which the prime and sub will transition to an actual subcontract after award. Attorneys need to draft and review these agreements carefully. Key issues: exclusivity provisions that prevent the sub from teaming with a competitor for the same procurement; work share percentages that affect small business set-aside eligibility; assignment provisions, because most government prime contracts cannot be assigned to another entity without government consent; and the transition mechanism that converts the teaming agreement into a subcontract after award.

The teaming structure also intersects with small business set-aside law in important ways. If the solicitation is a small business set-aside, the prime must be a small business. Subcontractors do not need to be small businesses. But if the prime subcontracts so much of the work that the sub is essentially performing the primary and vital contract requirements, the Small Business Administration may find that the arrangement violates the ostensible subcontractor rule — which can result in the prime being declared other than small and losing the contract. This is one of the most frequent legal problems I see in GovCon practice.

Let us talk about organizational conflicts of interest, or OCI. FAR Subpart 9.5 requires contractors to identify and disclose potential conflicts of interest in connection with a procurement. The government evaluates whether a conflict exists and may require a mitigation plan or disqualify the contractor from bidding. OCI comes in three flavors. The first is unequal access to information — the contractor has proprietary or non-public information that gives it a competitive advantage in the procurement. The second is biased ground rules — the contractor helped write the specifications or the statement of work, and therefore had an unfair hand in designing the competition it now wants to win. The third is impaired objectivity — the contractor would be in the position of evaluating its own products or services under the contract. The foundational case is Aetna Government Health Plans, decided by the Court of Federal Claims in the mid-nineties, which established that the OCI standard is objective — the government does not need to prove that an actual conflict occurred, only that the structural conditions for a conflict exist. This matters practically: a contractor who helped write an agency's requirements document may be disqualified from bidding on the resulting procurement even if everyone involved acted in perfect good faith.

Before I leave the pre-award phase, I want to talk about one of the most important traps in government contracting: the solicitation ambiguity waiver rule. When a contractor reviews a solicitation and notices something ambiguous or problematic, the contractor must raise it immediately — either by filing a pre-award bid protest at the GAO or by requesting a clarification from the agency during the question and answer period. If a contractor notices a problem and says nothing, submits a proposal anyway, and only raises the issue after losing the award, the protest ground is waived. GAO has dismissed hundreds of protests on this basis. This means that solicitation review is not just about understanding what to propose. It is also about identifying legal issues that, if not raised now, are gone forever. As a lawyer reviewing a solicitation for a client, you are playing offense and defense simultaneously.

This week, your practical exercise is to find a live solicitation on SAM.gov and build an actual compliance matrix. I want to emphasize that this is not an academic exercise. This is the core skill you will use in pre-award client work. Read the whole document. Find Section L and Section M. Build the matrix. Then ask yourself: what are the three riskiest requirements in this solicitation for a contractor trying to win? That question — where is the legal risk in this document? — is what clients are paying you to answer.

Your reflection question for this week: after reading a real solicitation, what is the single legal issue that jumps out at you as the most consequential if missed? Write it down, and think about how you would surface that issue in a client conversation within the first fifteen minutes of reviewing a new solicitation opportunity.

Good luck this week. The pre-award phase is where the most preventable mistakes happen. An attorney who is deeply embedded in the pre-award process — reading solicitations early, building compliance matrices, flagging OCI issues, drafting airtight teaming agreements — is genuinely irreplaceable to a government contractor. See you tomorrow.`

    title: "Small Business Programs: The Federal Government's Most Powerful Contractor Development System",
    duration: "~20 min",
    script: `Good morning. This week we are covering small business programs, and I want to begin with some context that will frame everything else you learn. The federal government is the world's largest buyer, and it has made a statutory commitment to channel a significant share of that purchasing power to small businesses. The Small Business Act establishes a government-wide goal of awarding twenty-three percent of the total value of federal prime contracts to small businesses in any given fiscal year. That twenty-three percent of an eight-hundred-billion-dollar annual procurement budget is roughly one hundred and eighty-four billion dollars. That is an enormous amount of contracting opportunity that is legally reserved, at least in part, for small businesses. For a Georgia attorney building a GovCon practice, small business contracting law is one of the most practical and high-demand areas you can develop.

Let us start with the foundational question: what does "small" mean? The answer is: it depends entirely on the industry. The Small Business Administration defines small business size standards on an industry-by-industry basis using the North American Industry Classification System, called NAICS. Each NAICS code has a specific size standard, expressed either as a maximum annual revenue or a maximum number of employees. Construction firms are typically judged by revenue. Technology services firms are often judged by employee count. Manufacturing companies use employee count. The thresholds vary enormously. A business with five hundred employees might be small in one industry and a large business in another, depending on the applicable NAICS code. This matters because when a contractor registers on SAM.gov and certifies its size status, it is certifying size under the specific NAICS codes it operates in. When it competes for a set-aside contract, its size is evaluated under the NAICS code assigned to that specific procurement. Getting the NAICS code right is a legal and strategic issue, not just an administrative one.

Now let us walk through the major set-aside programs. I will start with the broadest: the small business set-aside. Under FAR Part 19, contracting officers are required to conduct a rule of two analysis before issuing any solicitation. If it is reasonably expected that at least two small businesses will bid, the solicitation must be set aside for small business competition exclusively. This means large businesses cannot compete at all. The small business set-aside is the workhorse of the small business program — it applies automatically, without any application process, simply by virtue of a contractor being certified small for the applicable NAICS code.

Beyond the basic set-aside, there are four socioeconomic programs that create additional preferences and sole-source opportunities for specific categories of small businesses. The first is the Eight-A Business Development Program, administered by the Small Business Administration. Eight-A eligibility requires that the business be at least fifty-one percent owned and controlled by one or more socially and economically disadvantaged individuals, that it be small under the applicable size standard, that the owner be of good character, and that the business demonstrate potential for success. Eight-A participants are enrolled in a nine-year program divided into a four-year developmental stage and a five-year transitional stage. During that program, the SBA can award contracts to Eight-A participants on a sole-source basis, without competition, up to certain dollar thresholds — which for services is currently around four and a half million dollars, and for manufacturing is around seven million. The Eight-A program is one of the most powerful mechanisms in all of federal contracting for building a business from early stage to competitive scale. An attorney who can guide clients through Eight-A certification and contract execution has a very valuable practice.

The second program is the HUBZone program. HUBZone stands for Historically Underutilized Business Zone. To qualify, the business must be small, it must be principally located in a designated HUBZone area, and at least thirty-five percent of its employees must reside in HUBZone areas. HUBZone status provides both set-aside competition preferences and a ten percent price evaluation preference in full and open competition. The geographic requirements make HUBZone status particularly valuable in certain areas of Georgia that have been designated as underutilized, and there are meaningful HUBZone areas around Atlanta and the rural parts of the state.

The third program is Service-Disabled Veteran-Owned Small Business, or SDVOSB. To qualify, the business must be at least fifty-one percent owned and controlled by one or more service-disabled veterans, the veteran must control the strategic and day-to-day management of the company, and the business must be certified through the SBA's VetCert program. SDVOSB set-asides are particularly prevalent in Department of Defense and VA contracting. The VA has an even stronger veteran-owned preference program of its own, and attorneys serving veteran entrepreneurs in Georgia should be deeply familiar with both.

The fourth program is Women-Owned Small Business, or WOSB. The business must be at least fifty-one percent owned and controlled by one or more women, the women must control management and daily operations, and the business must be certified. An enhanced category called Economically Disadvantaged Women-Owned Small Business, or EDWOSB, has additional income and asset requirements. The WOSB program restricts set-asides to industries where women-owned small businesses are underrepresented in federal contracting, and there is a published list of eligible NAICS codes.

Now I need to spend significant time on what I consider the most dangerous concept in small business law: affiliation. Under SBA regulations, two businesses can be deemed affiliated with each other, which means their revenues and employees are combined for size purposes. If two businesses are affiliated, they may both be considered large businesses even if each is individually small. Affiliation can arise in many ways. Common ownership or control is the most obvious. If the same person owns fifty percent of two businesses, those businesses are affiliated. Economic dependence is another basis: if a small business receives seventy percent or more of its revenue from a single other entity, that economic dependence may create affiliation. Identity of interest can also create affiliation when businesses share facilities, employees, or management in ways that suggest they are not truly independent. Minority ownership combined with other factors — like shared management or critical subcontracting relationships — can also create affiliation.

The most litigation-intensive affiliation rule is the ostensible subcontractor rule. This rule specifically addresses the small business teaming context. If a small business prime contractor proposes to have a large business subcontractor perform the primary and vital requirements of the contract, the SBA may find that the sub is the real prime and that the small business prime is a pass-through, making the arrangement ineligible for the small business set-aside. The key phrase is primary and vital. Courts and the SBA look at: what percentage of the contract value does the sub perform? Does the sub perform the core technical work or just support functions? Is the small prime genuinely managing and directing the work, or is the sub running the show? These questions are intensely fact-specific, and the stakes are enormous — an affiliation finding on an already-awarded contract can result in the contract being terminated.

I want to give you a practical framing for why small business law is such a rich practice area for Georgia attorneys. Georgia has a massive defense presence. Fort Eisenhower, Robins Air Force Base, Hunter Army Airfield, Naval Submarine Base Kings Bay — these installations generate billions of dollars in annual procurement. The contractors supporting these installations range from large defense primes to thousands of small businesses performing maintenance, professional services, construction, and technical support. Many of those small businesses have complex teaming arrangements, size standard questions, and socioeconomic certifications that create legal work. At the same time, DOAS — the Georgia Department of Administrative Services — runs state-level supplier diversity programs that create parallel opportunities for small, minority-owned, and veteran-owned Georgia businesses in state contracting. The skillset that serves federal small business clients overlaps significantly with the skillset that serves state procurement clients.

This week's readings are going to take you into the actual regulatory text. The SBA's affiliation regulations at 13 CFR Section 121.103 are dense but readable. The ostensible subcontractor rule specifically is at 13 CFR Section 121.103(h)(4). Read it carefully. Then find a published SBA Office of Hearings and Appeals decision on the ostensible subcontractor rule and read the whole thing. You will see how the SBA analyzes facts, how it weighs evidence, and how thin the margin can be between a compliant team and a disqualified one.

Your reflection question for this week: if you were advising a small business construction firm in Georgia that wants to pursue an Eight-A certification and then compete for contracts at Robins Air Force Base, what is the sequence of steps you would recommend? Think about certification timeline, which NAICS codes to register under, teaming strategy, and what legal issues would arise in the first contract year. Write out a rough roadmap. This is the kind of whole-problem thinking your clients will need.

See you tomorrow for the daily reading sessions. Small business law is one of the most client-facing, high-frequency areas of GovCon practice. Learn it well.`

    id: 4,
    title: "Contract Formation and the Doctrines That Override the Document",
    duration: "~23 min",
    script: `Good morning. This week we are covering the doctrines that make government contract law genuinely different from everything else you have studied. In commercial contract law, you look at the four corners of the document. What did the parties agree to? What did they write down? The document is the contract, and the contract is the document. Government contracts do not work that way. In government contracting, there is a body of mandatory law that sits behind and above any written contract document. Clauses are implied into contracts by operation of law. Government agents can make representations that are completely unenforceable. And the government retains rights that contractors never knew existed. This week is about those doctrines, and by the end of it you will understand why experienced GovCon lawyers say that a government contract is never just a contract.

Let us start with the Christian Doctrine, because it is the most dramatic example of what I just described. In 1963, the Court of Claims decided G.L. Christian and Associates versus the United States. Christian and Associates had entered into a contract with the federal government to construct housing for military personnel. The contract was a standard government construction contract, but through some oversight — apparently a drafting error — the standard Termination for Convenience clause was not included in the written document. The government then terminated the contract before completion. Christian and Associates took the position that since the termination clause was not in their contract, the government had no right to invoke it, and the termination constituted a breach for which they were entitled to full breach damages. The Court of Claims rejected this argument. The court held that certain mandatory regulatory clauses are incorporated into government contracts by operation of law — they become part of the contract whether or not anyone actually wrote them in. The justification is that these clauses reflect mandatory procurement policy, required by regulation, and no one has the authority to waive them on the government's behalf. The court said, in effect: the regulation required this clause to be in every contract of this type. The clause was therefore in this contract. The omission was a drafting error that could not expand contractor rights or reduce government rights.

The practical consequence of the Christian Doctrine is profound. You cannot look at a government contract document and assume that what you see is all there is. Certain clauses are implied by law, regardless of whether they appear on paper. This includes the Termination for Convenience clause at FAR 52.249-2, which we will discuss in depth. It also includes the Disputes clause at FAR 52.233-1, which requires contractors to continue performing while disputes are resolved. It includes the Anti-Kickback clause at FAR 52.203-7. And it potentially includes a long list of other clauses that are required for specific contract types under specific agencies. The difficult part is that there is no master list of Christian Doctrine clauses. Whether a particular clause is mandatory by implication depends on the contract type, the agency, and the regulation. This means that thorough contract review requires checking the applicable FAR and DFARS coverage matrices to identify which clauses are required for that type of procurement.

Now let us move to the Merrill Doctrine. In 1947, the Supreme Court decided Federal Crop Insurance Corporation versus Merrill. The facts are simple and the lesson is unforgettable. An Idaho wheat farmer was seeking federal crop insurance from the Federal Crop Insurance Corporation, which at the time was a federal agency. The farmer told his local government agent that he intended to reseed winter wheat on land that had previously produced wheat. The local agent told him that the crop would be covered and issued an insurance policy. The crop failed due to drought. The farmer submitted a claim. The agency denied it, because the agency's own regulations specifically prohibited coverage of reseeded wheat crops on that type of acreage. The farmer's argument was straightforward: my local agent told me I was covered. The agency issued me a policy. I relied on that. The Supreme Court disagreed. The government is not bound by an agent's mistaken advice, the court held, when that advice conflicts with published regulations. The published regulations — open to the public, available to anyone who looked — were binding on the farmer whether or not he had actually read them. The government's agent acted without actual authority, and the farmer bore the risk of not verifying regulatory requirements.

The Merrill Doctrine has three interconnected principles that you need to internalize. First, the actual authority doctrine: only government officials acting within their actual statutory and regulatory authority can bind the federal government. Apparent authority — the principle that binds private parties when someone appears to have authority — does not bind the government. Second, constructive notice of regulations: published federal regulations are binding on contractors even if the contractor never read them. Third, contractor responsibility: contractors bear significant responsibility for verifying both the regulatory authority of government officials they deal with and the regulatory requirements governing their contracts.

The practical application of the Merrill Doctrine arises constantly in the field. The person a contractor deals with day to day on a federal contract is usually not the Contracting Officer. It is the Contracting Officer's Representative — the COR — who is on-site, who gives direction, who signs off on work, who makes representations about what the contract requires. But the COR generally cannot bind the government. The COR cannot direct changes to the scope of work. The COR cannot promise additional compensation. The COR cannot extend the performance period. Only the Contracting Officer, acting within the scope of the warrant issued to that CO, can modify a government contract. When a COR tells a contractor to perform additional work, and the contractor does so without a formal change order signed by the CO, the contractor has typically performed work it may never be paid for. This is one of the most common sources of contractor losses in the field, and it is one of the first things you should explain to any client new to government contracting.

This leads directly to the Changes Clause and the doctrine of constructive change. Read FAR 52.243-1, the Changes clause for fixed-price contracts. This clause gives the Contracting Officer the unilateral right to direct changes within the general scope of the contract — changes to specifications, drawings, methods of shipment or packing, place of delivery, and similar items. When the CO exercises this right, the contractor is entitled to an equitable adjustment to the contract price and schedule to account for the impact of the change. So far so good. But what happens when the government effectively changes the contract without issuing a formal change order? That is the constructive change doctrine. A constructive change occurs when a government agent's actions, directions, failures, or interpretations require the contractor to perform work beyond the contract's original scope, without a formal change order. Common examples: a government inspector who rejects conforming work based on an unstated standard; a CO who provides defective government-furnished specifications that require the contractor to do extra work to fix; a COR who verbally directs the use of more expensive materials; or a base closure that prevents a contractor from accessing the job site, extending the schedule and adding costs. In each case, the contractor has been changed — its costs have increased or its schedule has extended — without a formal adjustment mechanism being triggered. The constructive change doctrine allows contractors to claim equitable adjustment for these government-caused impacts, but only if the contractor follows the right procedural steps. The contractor must document the direction it received, assert the constructive change claim promptly, and continue performance while preserving rights. Stopping work because of a constructive change is almost never the right answer.

Now the Termination for Convenience. This is one of the federal government's most extraordinary contractual rights, and it is one that has no real commercial equivalent. Under FAR 52.249-2, the government may terminate a fixed-price contract at any time, for any reason, simply because it is in the government's interest to do so. No default by the contractor is required. No breach is required. No change in law is required. The government can terminate a contract because it changed its mind, because appropriations ran out, because Congress changed the program, because a new administration has different priorities, or for any other reason. The contractor's remedy upon a Termination for Convenience is not breach damages. It is a termination settlement under FAR Part 49: allowable costs incurred through the termination date, an allocable portion of overhead, and a reasonable profit on work actually performed. What the contractor cannot recover is lost anticipated profit on work that would have been performed but was not. This is often the most devastating aspect of a Termination for Convenience for a contractor — if they had expected to earn significant profit on the unperformed work, that expectation is largely uncompensable.

The key precedent on challenging a Termination for Convenience is the Kregowski case, which reinforced how difficult it is for a contractor to successfully argue that a Termination for Convenience was improper. To overcome the government's right to terminate, the contractor must prove bad faith — and there is a strong presumption that government officials act in good faith. Changed circumstances, revised procurement strategies, re-evaluation of agency needs, or a decision to restructure the procurement to benefit small businesses — all of these have been held sufficient to justify a Termination for Convenience without any finding of bad faith. This means that if you represent a contractor who has been terminated for convenience and believes the termination was improper, you need affirmative evidence of bad faith, not just dissatisfaction with the government's reasoning. Document retention from the first day of performance is essential for this reason. You need a contemporaneous record of what the government knew, what it represented, and when it made the decision to terminate.

Let us also briefly discuss Organizational Conflicts of Interest, because they arise in the pre-award phase but are often litigated in the context of contract award and performance. The foundational case is Aetna Government Health Plans, decided by the Court of Federal Claims. An OCI challenge does not require proof that an actual conflict of interest occurred or that anyone acted with improper motive. The standard is objective: would a reasonable person looking at the structural facts believe that the contractor's ability to compete fairly was enhanced, or that its objectivity in performing would be impaired? This objective standard makes OCI analysis both important and uncertain — there is no bright line, and fact-intensive judgment is required.

Your reading this week is going to take you to primary sources: the actual cases, the actual clauses. Read Christian Associates. Read Merrill. Read FAR 52.249-2 and 52.243-1. Read FAR Subpart 9.5. These documents are not long. The Christian Doctrine case is a dozen pages. The Merrill case is eight pages. The clauses are a few pages each. But reading them in their original form builds the pattern recognition you need for practice.

Your reflection question: a client calls you and says the government has just sent a termination for convenience notice on a contract your client had been performing for two years and was counting on for three more years of revenue. What are the first three things you tell the client to do in the next twenty-four hours? Think about documentation preservation, claim preparation, and deadlines.

See you tomorrow. This week's doctrines are the most intellectually interesting material in GovCon law. Understand them deeply and you will immediately be more useful to any contractor client than an attorney who has not taken the time to study them.`

    id: 5,
    title: "The Contract Disputes Act: From Dispute to Decision to Appeal",
    duration: "~22 min",
    script: `Good morning. This week we are covering the Contract Disputes Act — the procedural framework that governs how post-award disputes between contractors and the federal government are formally resolved. The CDA is one of those areas where the procedural rules matter enormously, where missing a deadline can be fatal to a meritorious claim, and where an attorney who knows the framework provides irreplaceable value. By the end of this week, you will understand the full claims pathway from the first sign of dispute through formal appeal, and you will understand the strategic considerations that inform every decision along the way.

Let us start with the statute itself. The Contract Disputes Act was enacted in 1978 and is codified at Title 41 of the United States Code, Sections 7101 through 7109. Before the CDA, the landscape for government contract disputes was fragmented and contractor-unfavorable. The CDA created a uniform, statutory framework that applies to all contracts for the procurement of property and services by executive agencies. Its coverage is broad, but not unlimited — which I will come back to.

The CDA pathway begins with a dispute. Something has gone wrong. The contractor has performed additional work that was never compensated. The government has withheld payment the contractor believes it is owed. The government has made a demand for repayment of amounts the contractor received. There has been a termination for convenience and the parties cannot agree on the settlement amount. The first step is negotiation. You should always attempt to resolve disputes through direct negotiation with the Contracting Officer before reaching for formal legal mechanisms. Most experienced practitioners will tell you that the majority of government contract disputes settle at the negotiation stage, and settling early is almost always better than litigating for years in front of a board or court.

If negotiation does not resolve the dispute, the next step depends on whether you are the contractor asserting a claim or the government asserting a demand. For a contractor-initiated dispute, the contractor submits a Request for Equitable Adjustment, or REA. An REA is an informal document — there is no magic format required — in which the contractor sets out the factual basis for the dispute, the legal theory supporting recovery, and the dollar amount sought. The REA is not a formal claim under the CDA. It does not require certification. It does not start any appeal clocks. It is a negotiating document, and submitting it gives the Contracting Officer an opportunity to evaluate the contractor's position and potentially settle without the formality of a certified claim. Many disputes are resolved at the REA stage. In my experience, a well-prepared REA that presents a clear factual narrative, ties the facts to the applicable contract clauses, and includes well-documented cost data is a far more effective settlement tool than a bare demand letter.

When REA negotiation fails — or when the parties are too far apart, or when there is time pressure — the contractor escalates to a certified claim. A certified claim is a formal legal demand submitted to the Contracting Officer under the CDA. For claims exceeding one hundred thousand dollars, the contractor must certify the claim using specific statutory language: that the claim is made in good faith; that the supporting data are accurate and complete to the best of the claimant's knowledge and belief; and that the amount claimed accurately reflects the contract adjustment for which the contractor believes the government is liable. This is not boilerplate. This is a legal certification with consequences. A contractor who certifies a claim knowing the supporting data are inaccurate, or knowing the claimed amount is inflated, has potentially committed both a CDA violation and a False Claims Act violation. You must counsel clients to take certification seriously.

One important point about defective versus fraudulent certifications: a merely defective certification — one that uses the wrong language or is signed by the wrong person — does not destroy jurisdiction. The Federal Circuit has held that a defective certification can be corrected even after the appeal has been filed. A fraudulent certification is a completely different matter. And a knowing failure to certify when certification is required is also a problem. The certification requirement is mandatory for claims over one hundred thousand dollars. It is not optional.

After the contractor submits a certified claim, the Contracting Officer must issue a Final Decision, known as the COFD. For claims under one hundred thousand dollars, the CO has sixty days to issue the COFD. For larger claims, the CO must either issue the COFD within a reasonable time or provide a date certain by which it will be issued. What happens if the CO simply does not respond? After a reasonable time — and this is necessarily context-dependent — the contractor can treat the failure to respond as a deemed denial, and appeal that deemed denial. The COFD is the trigger for everything that follows. It is the document that starts the appeal clocks.

Once you have a COFD, the contractor has two forum options for appeal: the Agency Board of Contract Appeals, or the Court of Federal Claims. Let us walk through each. If the contract was with the Department of Defense, appeals go to the Armed Services Board of Contract Appeals, the ASBCA. If the contract was with a civilian agency, appeals generally go to the Civilian Board of Contract Appeals, the CBCA, at the General Services Administration. Both boards have their own rules of procedure adapted from federal civil procedure, with discovery, briefing, and evidentiary hearings. Board proceedings are somewhat less formal than federal court and are decided by administrative law judges who typically have significant experience in government contracts. The appeal window to the board is ninety days from receiving the COFD. This is a hard deadline. Missing it by one day means the COFD becomes final and unappealable. There is essentially no equitable tolling, no excusable neglect exception, no way to get back in. If you are representing a contractor client and you discover they received a COFD three months ago without telling you, that is the first question you ask: what day did they receive it?

The alternative forum is the Court of Federal Claims. The COFC is an Article I federal court located in Washington, D.C., with nationwide jurisdiction over money claims against the United States government. Unlike the boards, the COFC has one year from the COFD to file — twelve months, not ninety days. The COFC applies federal rules of civil procedure, the judges have life tenure, and proceedings follow the pattern of ordinary federal litigation. The COFC is generally better for very large claims, for cases where the factual record is contested and you need full discovery, and for cases where existing board precedent is adverse to your client's position — because the COFC reaches its own conclusions and is not bound by board decisions.

There is a strategic dimension to forum selection that experienced practitioners think about carefully. Boards are faster and cheaper — ASBCA proceedings often move to decision in two to three years even on complex cases, while COFC litigation can take longer and costs more. Boards have experienced judges who understand GovCon specifics without needing to be educated on the basics. But the COFC offers de novo review, full jury-waivable federal litigation, and potentially more favorable precedent depending on the issue. The choice between the board and COFC should be made early, carefully, and in consultation with the client about budget, risk tolerance, and timeline needs.

I need to spend a few minutes on a topic that the CDA statute explicitly excludes: Other Transaction agreements, called OTs. DoD has statutory authority to enter into certain research, prototype, and production agreements that are explicitly not contracts and are explicitly not subject to the FAR. These agreements — usually called OTAs or Other Transaction Agreements — have grown enormously over the past decade as a way for DoD to access non-traditional defense companies and move faster than traditional procurement allows. But the CDA does not apply to OTs. If an OT contractor has a dispute with the government, there is no statutory claims pathway, no board jurisdiction, no standard COFD-and-appeal mechanism. The contractor's rights depend entirely on what the OT agreement itself says about disputes. Before advising any client on a potential dispute, confirm the vehicle. If the words Other Transaction appear anywhere in the contract documents, your entire CDA analysis may be inapplicable.

Let me also address interest. CDA interest runs from the date the Contracting Officer receives the certified claim to the date of payment. The interest rate is the Treasury borrowing rate, published quarterly. For large claims that take years to resolve, accumulated CDA interest can be a significant portion of the total recovery. Always account for interest in claim calculations and make sure it appears in the certified claim demand.

Your reflection question for this week: a contractor client calls you today and says the government issued a COFD thirty-seven days ago for three hundred and twelve thousand dollars. The CO denied the claim in full, claiming the additional work was within the original scope. The contractor believes this is wrong and wants to fight it. Walk through the decision tree: what are the forum options, what are the exact deadlines, what additional information do you need before advising on whether to appeal and where?

This is the kind of analysis you will do on the first phone call. Deadline calculation is not a background skill — it is front and center. See you tomorrow.`

    duration: "~21 min",
    script: `Good morning. This week we are covering bid protests — the area of government contracting law that operates under the most compressed timelines and carries some of the highest stakes for both contractors and agencies. A bid protest is a legal challenge to the award of a government contract or the terms of a solicitation. Bid protests are pre-award litigation in the sense that you are trying to undo, delay, or redirect a procurement decision, rather than recover damages after performance has occurred. This is a fast-moving, deadline-driven practice area, and attorneys who do it well develop a specific set of skills that are quite different from the skills required for post-award contract disputes work.

Let us begin with the three main protest forums and how they differ. The first and by far the most commonly used is the Government Accountability Office. The GAO's Procurement Law Division handles bid protests under its statutory authority under the Competition in Contracting Act. GAO is the dominant protest forum for several reasons: it is faster, cheaper, and it comes with an automatic stay of contract performance upon timely filing — which is the single most powerful feature of the GAO protest process. The second forum is the Court of Federal Claims, which has concurrent bid protest jurisdiction with the GAO. The COFC offers broader remedial authority, de novo review, and the ability to issue injunctions that are legally binding rather than merely advisory — but proceedings are more expensive and slower. The third forum is the agency level. Before going to GAO or COFC, a disappointed offeror can protest directly to the contracting agency. Agency protests are fast — usually resolved within thirty-five days — but they suffer from an obvious structural problem: the same agency that made the award decision is deciding whether it was wrong. Agency protests are most useful when you have a very clear and well-documented procedural error that the agency might simply correct to avoid the time and expense of a GAO protest.

Let us spend significant time on the GAO process because it is where you will do most of your protest work. A bid protest at GAO begins with filing a written protest. There are specific filing deadlines that are hard and unforgiving. For protests of post-award decisions, you must file within ten calendar days after the basis of the protest is known or should have been known. In practice, this usually means ten days after the agency notifies you that the contract has been awarded to a competitor. For protests that follow a required post-award debriefing, the deadline is five days after the debriefing. Counting matters. Weekends count. Holidays count. If day ten falls on a Saturday, you must file by Friday, the preceding business day. If you are retained by a disappointed contractor on a Monday and the award was announced ten days earlier, the automatic stay is already gone. Understanding and calculating these deadlines in the first phone call with a new client is not an optional skill — it is the threshold skill for protest practice.

When a protest is filed at GAO within the ten-day window, there is an automatic stay of contract performance. This means the agency is legally required to suspend work on the new award while the protest is pending. The winning contractor cannot start work. The agency cannot make progress. Both parties are essentially frozen until GAO decides. This automatic stay is enormously valuable. It creates leverage for settlement, it prevents the winning contractor from building up a performance record that makes it harder for GAO to recommend corrective action, and it ensures that your client's protest is taken seriously. Agencies and winning contractors both have strong financial incentives to take the protest seriously when there is a stay, because every day of delay costs someone money.

After a protest is filed, the process follows a structured timeline. The agency has thirty days to submit an Agency Report — its defense of the procurement decision, including the administrative record of the evaluation. The protester then has ten days to file comments responding to the agency report. GAO then issues its decision within one hundred calendar days of the protest filing — or sixty-five days if the parties agree to the express option. This timeline is relatively strict, and GAO generally adheres to it. One hundred days from filing to decision on a government contract dispute is extraordinarily fast compared to any other litigation context.

Before diving into what makes a protest win, let me address what is perhaps the most consequential procedural trap in protest practice: the solicitation ambiguity waiver rule. GAO decisions are absolutely clear on this: if a solicitation contains an apparent defect — an ambiguity, an inconsistency, a term that a competitor believes is illegal or improper — the protester must file a pre-award protest before the proposal due date, or the ground is waived. If a contractor notices that the solicitation's evaluation criteria are ambiguous, reads the requirement, decides to take a chance and submit a proposal anyway, and then loses the award and files a protest claiming the evaluation criteria were improper — GAO will dismiss the protest. The reasoning is straightforward: allowing post-award challenges to solicitation terms would enable contractors to gamble on a favorable interpretation and only complain when they lose. Pre-award protest is the only remedy for solicitation defects. This means that every solicitation review you do for a client must include a legal assessment: are there any protest grounds here that must be raised now or forever lost?

What grounds actually win at GAO? The most successful protest grounds are procedural: the agency failed to follow its stated evaluation methodology; the agency applied different standards to different offerors; the agency made mathematical errors in scoring; the agency failed to conduct meaningful discussions when it was required to. Unequal treatment — giving one offeror information, opportunities, or advantages that were not given to competitors — is highly fact-specific but winnable when the record supports it. Organizational Conflict of Interest — where the awardee had a structural advantage from prior work for the agency — is a strong ground when the facts support it. Solicitation ambiguity challenges — where the RFP's evaluation criteria were internally inconsistent — are viable, but only as pre-award protests.

What grounds rarely win? Challenges to the government's technical evaluation judgment. GAO gives agencies significant discretion in evaluating the technical merits of proposals. If the agency scored your client's technical approach lower than a competitor's, and the reasoning in the evaluation record is coherent and connected to the stated criteria, GAO will generally not second-guess the agency's technical judgment. Price reasonableness determinations — whether the winning price was too low — are similarly deferential. If you are going to win a post-award protest, you need to find an error in process, not just argue that your client had the better proposal.

Now let me talk about something that is somewhat less discussed in the legal literature but very important for practitioners: the offensive use of automatic stay. The bid protest automatic stay can be, and is, used strategically by disappointed offerors not because they believe they will win on the merits, but because the stay forces a delay that creates competitive advantage. Imagine a scenario: a new small business has just won its first significant government contract, and its cash flow depends on getting to work quickly. A larger competitor files a protest. The stay freezes the contract. The small business cannot begin work and cannot generate revenue for one hundred days. In some cases, this kind of financial pressure may force the winning contractor to negotiate or may simply damage its ability to perform. Experienced practitioners are aware of this dynamic, and when representing winning contractors facing protests, they should advise clients that the protest may be as much about delay tactics as legal merit. The agency has the ability to override the automatic stay by finding that urgent and compelling circumstances require continuation of the award — but that override requires formal justification and is not easy to get. When representing an awardee facing a protest, document the urgency and the cost of delay early, because you may need it.

Let me briefly discuss the Court of Federal Claims as a protest forum. Unlike GAO, whose remedies are advisory — meaning GAO recommends corrective action but cannot legally compel it — the COFC can issue injunctions, and those injunctions are legally binding. The COFC also conducts de novo review, meaning it does not simply defer to the agency record but can hear evidence and reach its own conclusions. For very large and complex procurements, or cases involving classified information, or cases where the agency has repeatedly failed to correct errors after GAO recommendations, COFC may be the right forum. The standard for a preliminary injunction at COFC requires the protester to show likelihood of success on the merits, irreparable harm, balance of hardships favoring the protester, and that injunctive relief would not harm the public interest. In a procurement context, showing irreparable harm is relatively easy if the protest concerns a contract that would give the winning contractor a performance record that can never be undone.

The Georgia-specific dimension of protest practice involves DOAS and state-level protests. When a Georgia state agency awards a contract and a competitor believes the award was improper, the protest must be filed within ten calendar days of the notice of intent to award. The protest goes to DOAS. The process is faster and less formal than GAO, but the same fundamental issues arise: deadline calculation, standing, grounds for protest, and remedies. And critically, the same solicitation ambiguity waiver rules apply — if the procurement document had a flaw, you must raise it early.

Your reflection question: a client calls you at four in the afternoon on a Thursday. Their company submitted a bid for a major federal contract last month. The agency just sent a notice of award to a competitor, and your client believes the evaluation was improper. They want to protest. What do you tell them in the first five minutes of the call? Think about: what is the exact deadline for preserving the automatic stay? What information do you need from them before you can assess the case? What is the very first document you need to see?

Bid protest practice is genuinely exciting. The deadlines force fast, high-quality work. The stakes are real. And the skills you develop — rapid administrative record review, quick legal analysis of evaluation methodology, tight written argument — are transferable to every other area of GovCon practice. See you tomorrow.`

    id: 7,
    title: "The False Claims Act and Government Contracting Ethics",
    duration: "~22 min",
    script: `Good morning. This week we are covering the False Claims Act and the ethics and compliance framework that governs federal contractor conduct. I want to start with a number that will orient the entire discussion. In fiscal year 2025, the Department of Justice recovered six point eight billion dollars under the False Claims Act. Billion. In a single year. That is not the accumulated total of a program. That is one year's worth of FCA enforcement. The FCA is not a theoretical risk. It is an active, well-funded enforcement priority that affects defense contractors, healthcare providers, research universities, and virtually any private entity that receives federal funds.

The False Claims Act was signed into law by Abraham Lincoln during the Civil War, when Congress was alarmed by contractors supplying the Union Army with defective weapons, lame mules, and spoiled food while certifying to the government that the goods were conforming. The original FCA criminalized fraudulent claims against the government and provided a mechanism for private informants — called qui tam relators — to bring cases on the government's behalf. Since then, the FCA has been amended several times, most significantly in 1986 and 2009, dramatically expanding its coverage and penalties. What started as a Civil War anti-fraud statute is now the federal government's most powerful civil tool for recovering money from contractors who defraud federal programs.

Let us go through the basic elements of an FCA violation. Under 31 U.S.C. Section 3729, a person is liable under the FCA if they knowingly present a false or fraudulent claim for payment to the government; knowingly make or use a false record or statement material to a false or fraudulent claim; or conspire to commit an FCA violation. The word knowingly is defined in the statute to include actual knowledge, deliberate ignorance of the truth, and reckless disregard of the truth or falsity of the information. Reckless disregard. This is a critically important concept. A contractor does not have to know that a claim is false in order to be liable under the FCA. If the contractor closed its eyes to information it should have investigated, if it certified accuracy without any reasonable basis for believing the certification was accurate, it may be liable under a reckless disregard theory.

The concept of materiality is equally important. The Supreme Court addressed this in 2016 in Universal Health Services versus the United States, which established the implied false certification theory of FCA liability. Under this theory, every claim for payment submitted to the federal government carries with it an implied certification that the contractor is in compliance with all statutes, regulations, and contract terms whose compliance is material to the government's payment decision. The word material means it could have affected the government's decision to pay. So a contractor who bills for services while knowingly violating a regulatory requirement that is material to the contract may be FCA-liable even if the bills themselves are arithmetically accurate — even if the amounts charged are exactly what the contract says. The violation of the regulatory requirement, combined with the submission of payment claims, is what creates liability.

Now the penalties. The FCA provides for treble damages — three times the amount of the government's actual loss — plus civil monetary penalties of between approximately thirteen thousand and twenty-seven thousand dollars per false claim, adjusted for inflation. In a contract with hundreds of invoices, the per-claim penalties alone can dwarf the actual damages. And importantly, FCA liability is in addition to criminal prosecution under federal fraud statutes, and in addition to suspension or debarment from government contracting. For a contractor whose business depends on federal contracts, debarment is a business-ending outcome. The combination of treble damages, per-claim penalties, potential debarment, and criminal referral makes the FCA the most powerful enforcement tool in the government's arsenal.

Let us spend time on the qui tam mechanism, because it is what makes the FCA uniquely effective and uniquely dangerous for contractors. Under 31 U.S.C. Section 3730, any private person — typically a current or former employee — can file an FCA lawsuit on behalf of the government, under seal, in federal district court. The case remains secret while the Department of Justice investigates. The DOJ has sixty days — often extended many times — to decide whether to intervene and take over the case. If the DOJ intervenes, the case becomes a government prosecution with the relator receiving fifteen to twenty-five percent of any recovery. If the DOJ declines to intervene, the relator can proceed on their own and receives twenty-five to thirty percent of any recovery. The financial incentive is enormous. An employee who becomes aware of a one hundred million dollar fraud scheme could personally recover twenty-five million dollars or more if the case succeeds. This creates powerful incentives for employees to scrutinize contractor billing practices and report concerns. Contractors need to understand that their employees are potential relators, and that a good internal reporting environment — one that takes compliance concerns seriously and does not retaliate against reporters — is both an ethical obligation and a practical defense.

The Eleventh Circuit — which covers Georgia, Florida, and Alabama — has been a focal point for a live constitutional challenge to the qui tam mechanism. The theory is that a private relator who prosecutes an FCA case on the government's behalf without being appointed as an officer of the United States may violate the Appointments Clause of Article II. Some Eleventh Circuit language has been sympathetic to this challenge. Other circuits have upheld qui tam as constitutional. The Supreme Court has not definitively resolved the circuit split. If the Court ultimately holds qui tam unconstitutional, the FCA's enforcement mechanism would be fundamentally altered. This is an area Georgia practitioners need to track closely.

Now let us talk about mandatory disclosure, because it creates an affirmative compliance obligation that surprises many contractors. FAR 52.203-13 requires contractors with contracts over six million dollars and a performance period exceeding one hundred twenty days to maintain a Code of Business Ethics and Conduct, an employee ethics training program, an internal reporting mechanism — typically a hotline — and critically, a mechanism for mandatory disclosure. Mandatory disclosure means the contractor must timely disclose to the contracting agency and the Inspector General whenever it has credible evidence of a violation of federal criminal law involving fraud, conflict of interest, bribery, or gratuities related to the contract. Failure to make a required disclosure is itself an FCA violation. This creates a difficult situation when a contractor's internal audit reveals potential fraud: disclose and risk triggering a government investigation, or don't disclose and risk the failure-to-disclose becoming an additional source of liability. When you represent a contractor facing this situation, your job is to assess the credible evidence standard carefully, advise on the disclosure obligation with precision, and ensure the contractor's response protects its rights while fulfilling its legal obligations.

Attorney-client privilege in the internal investigation context is one of the most practically important issues in government contracting practice. When a contractor receives a subpoena, when a relator's sealed complaint is unsealed, or when an internal audit surfaces a potential problem, the contractor's first call should be to outside counsel. The internal investigation should be conducted under attorney-client privilege, with legal counsel directing the investigation so that the work product protection attaches. The privilege does not exist simply because an attorney is involved — the attorney must be directing the investigation for the purpose of providing legal advice, not merely supervising a business process. Getting the privilege structure right from the beginning is essential, because once documents are created without privilege protection, they are discoverable.

Let us talk briefly about debarment and suspension, because they represent the harshest non-criminal consequence a contractor can face. Debarment is an administrative action that excludes a contractor from receiving any new federal contracts or subcontracts for a period of up to three years — or longer in cases involving fraud. Suspension is an interim exclusion pending investigation, typically lasting no more than twelve months. The grounds for debarment include conviction of certain crimes, civil FCA judgments, deliberate failure to perform, knowingly submitting false information, and a general catch-all for conduct indicating a lack of business integrity or responsibility. The standard for debarment is present responsibility — the question is not simply whether something bad happened in the past, but whether the contractor is currently responsible to perform. A contractor that has implemented robust remediation — corrected the problem, disciplined those responsible, strengthened compliance controls — can make a strong present responsibility argument even after a serious compliance failure. Representation at the debarment stage is critical because the contractor has only thirty days to respond to a Notice of Proposed Debarment, and missing that deadline typically waives the right to respond substantively.

Your reflection question for this week: a government contractor client calls you and says that three days ago, a former employee who was terminated last month filed a complaint with the Inspector General alleging that the company has been submitting inflated invoices on a cost-plus contract for the past two years. The company's CFO insists the billing was proper. What do you tell the client in the first meeting? Think about privilege, disclosure obligations, document preservation, and the business decisions the company will need to make.

The FCA and compliance area is high-stakes, intellectually demanding, and financially significant work. Contractors who are subject to FCA risk — which includes essentially every defense contractor, healthcare provider, and research institution — need knowledgeable outside counsel. Build this knowledge and you will never lack for clients. See you tomorrow.`
