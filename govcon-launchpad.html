// ─── MODULE 14: GOVCON GLOSSARY & DAILY TERMS ────────────────────────────────

const GLOSSARY_TERMS = [
  // ── KEY REGULATIONS & DOCUMENTS ──────────────────────────────────────────
  { term:"FAR", full:"Federal Acquisition Regulation", cat:"Regulations", def:"The primary regulation governing federal procurement. Jointly issued by DoD, GSA, and NASA, the FAR applies to virtually all federal executive agency acquisitions. Organized into 53 Parts, it prescribes acquisition planning, competition requirements, contract types, clause requirements, and dispute procedures. The FAR is supplemented — but never contradicted — by agency-specific supplements.", also:["DFARS","GSAM","VAAR"] },
  { term:"DFARS", full:"Defense Federal Acquisition Regulation Supplement", cat:"Regulations", def:"DoD's supplement to the FAR. Applied to all DoD contracts on top of the FAR. Contains DoD-specific requirements including cybersecurity (DFARS 252.204-7012), specialty metals, export controls, and small business requirements. When DFARS conflicts with FAR, DFARS generally controls for DoD contracts.", also:["FAR","CMMC"] },
  { term:"GSAM", full:"General Services Administration Acquisition Manual", cat:"Regulations", def:"GSA's supplement to the FAR, governing GSA acquisitions including GSA Schedule contracts, government-wide acquisition contracts, and real property. Contains specific procedures for Schedule contracting and GSA-unique requirements.", also:["FAR","MAS"] },
  { term:"VAAR", full:"Veterans Affairs Acquisition Regulation", cat:"Regulations", def:"VA's supplement to the FAR, with specific requirements for VA contracts including enhanced veteran-owned small business preferences under the Veterans Benefits, Health Care, and Information Technology Act.", also:["FAR","SDVOSB"] },
  { term:"NDAA", full:"National Defense Authorization Act", cat:"Regulations", def:"Annual legislation authorizing DoD programs, funding, and policy changes. The NDAA often includes GovCon policy provisions — changes to small business programs, cybersecurity requirements, domestic preference rules, and acquisition authority. Practitioners follow the annual NDAA closely because it frequently modifies the FAR framework.", also:["FAR","DFARS"] },
  { term:"OCGA", full:"Official Code of Georgia Annotated", cat:"Regulations", def:"The codified statutory law of Georgia. Georgia state procurement is governed primarily by OCGA § 50-5-50 through § 50-5-83 (State Purchasing Act). When advising on Georgia state contracts, OCGA Title 50 is the starting point. Available free at legis.georgia.gov.", also:["DOAS","GPR"] },
  { term:"CPARS", full:"Contractor Performance Assessment Reporting System", cat:"Regulations", def:"DoD's web-based tool for documenting contractor performance on federal contracts. Past performance ratings in CPARS affect future proposal competitiveness — a negative CPARS rating can significantly reduce a contractor's probability of winning future awards. Contractors have the right to review and respond to CPARS assessments.", also:["PPQ"] },
  { term:"PPQ", full:"Past Performance Questionnaire", cat:"Regulations", def:"A structured form sent by a proposal team to a customer reference asking them to rate the contractor's performance. PPQ responses are submitted directly to the procuring agency by the reference and become part of the technical evaluation record.", also:["CPARS"] },
  { term:"FPDS", full:"Federal Procurement Data System", cat:"Regulations", def:"The authoritative source of data on federal contract awards. Every award over the micro-purchase threshold must be reported in FPDS. Practitioners use FPDS to research an agency's buying patterns, identify competitors, and assess a client's competitive position. Accessible through usaspending.gov.", also:["SAM"] },
  { term:"SAM", full:"System for Award Management", cat:"Regulations", def:"The federal government's primary contractor registration database. Every entity seeking a federal contract must be registered and active in SAM.gov. SAM also contains the Excluded Parties List — firms that are debarred or suspended. Practitioners must verify client SAM registration before any proposal submission.", also:["FPDS","Debarment"] },

  // ── CONTRACT TYPES & VEHICLES ─────────────────────────────────────────────
  { term:"FFP", full:"Firm Fixed Price", cat:"Contract Types", def:"The government's preferred contract type. The contractor agrees to deliver the requirement for a fixed price regardless of actual cost. The contractor bears all cost risk; if it costs more than planned, the contractor absorbs the loss. If costs come in under, the contractor keeps the additional profit. Used when requirements are well-defined and risk can be reasonably estimated.", also:["CPFF","T&M","IDIQ"] },
  { term:"CPFF", full:"Cost Plus Fixed Fee", cat:"Contract Types", def:"A cost-reimbursement contract type where the government reimburses all allowable costs and pays a fixed fee negotiated at award. The fee does not change regardless of final cost. Used when requirements are too uncertain to price at fixed price. The government bears most cost risk. Requires Cost Accounting Standards compliance for larger contracts.", also:["FFP","CPIF","CAS"] },
  { term:"CPIF", full:"Cost Plus Incentive Fee", cat:"Contract Types", def:"A cost-reimbursement contract with a fee formula that incentivizes the contractor to control costs. The fee increases when costs come in below target and decreases when costs exceed target, within a ceiling. Aligns contractor and government interests on cost management better than CPFF.", also:["CPFF","CPAF"] },
  { term:"CPAF", full:"Cost Plus Award Fee", cat:"Contract Types", def:"A cost-reimbursement contract type where the fee is determined by a government evaluation board based on the contractor's performance during the evaluation period. Provides flexibility but requires significant government administration. Award fee decisions are largely within the government's discretion and are difficult to challenge.", also:["CPIF","CPFF"] },
  { term:"T&M", full:"Time and Materials", cat:"Contract Types", def:"A hybrid contract type under FAR Part 16.6 where the government pays a fixed hourly labor rate (which includes overhead and profit) plus actual material costs. Neither party bears pure cost risk. T&M is the least preferred contract type — FAR requires a determination that no other type is suitable. Often used for IT services and maintenance.", also:["FFP","LH"] },
  { term:"LH", full:"Labor Hour", cat:"Contract Types", def:"Similar to Time and Materials but without material costs. The government pays a fixed hourly rate for labor only. Used when the work is purely services with no significant materials component. Subject to the same FAR restrictions as T&M contracts.", also:["T&M"] },
  { term:"IDIQ", full:"Indefinite Delivery / Indefinite Quantity", cat:"Contract Types", def:"A contract vehicle that establishes terms and pricing for a period of time without committing to a specific quantity of work. The government issues task orders or delivery orders under the IDIQ as needs arise. Provides flexibility for agencies with unpredictable requirements. IDIQs can be single-award or multiple-award. The guaranteed minimum is a binding commitment; the ceiling is not.", also:["BPA","MAC","GWAC"] },
  { term:"BPA", full:"Blanket Purchase Agreement", cat:"Contract Types", def:"A simplified arrangement under FAR Part 13 that streamlines recurring purchases from a supplier without issuing a new contract each time. A BPA is not a contract — it is an agreement to use simplified acquisition procedures for anticipated future needs. Agencies call against a BPA by issuing individual calls.", also:["IDIQ","BOA"] },
  { term:"BOA", full:"Basic Ordering Agreement", cat:"Contract Types", def:"An agreement under FAR 16.703 that establishes terms and conditions — pricing methods, clauses, delivery requirements — that will apply to future contracts. Like a BPA, it is not a contract itself. Orders placed under a BOA become binding contracts.", also:["BPA","IDIQ"] },
  { term:"MAC", full:"Multiple Award Contract", cat:"Contract Types", def:"An IDIQ contract awarded to multiple contractors simultaneously. Agencies issue task orders to MAC holders, sometimes through further competition among the awardees ('fair opportunity'). Common examples: GSA Schedules, GWACs like OASIS and SEWP. Large MAC vehicles are the backbone of federal services contracting.", also:["IDIQ","GWAC","MAS"] },
  { term:"GWAC", full:"Government-Wide Acquisition Contract", cat:"Contract Types", def:"An IDIQ multiple-award contract that any federal agency can use to acquire IT products and services. Designated GWACs include GSA SEWP (products), GSA OASIS (professional services), and NIH CIO-SP. Being on a GWAC vehicle is a significant competitive advantage because it makes a contractor accessible to the entire federal government.", also:["MAC","MAS","IDIQ"] },
  { term:"MAS", full:"Multiple Award Schedule", cat:"Contract Types", def:"GSA's Federal Supply Schedule program — pre-competed contracts that establish pricing and terms for commercial products and services. Any federal agency can place orders against MAS contracts without conducting a full competition. MAS contracts are awarded and administered by GSA. Holding a MAS contract is often a baseline requirement for entering the federal market.", also:["GWAC","GSA","MAC"] },
  { term:"OTA", full:"Other Transaction Agreement", cat:"Contract Types", def:"A legally binding agreement authorized by statute that is explicitly not a FAR-governed contract. Used primarily by DoD (and now some other agencies) to access non-traditional defense companies, prototype new capabilities, and move faster than traditional procurement allows. OTAs are not subject to the FAR, the Contract Disputes Act, or standard protest procedures. Dispute rights are entirely determined by the OTA terms.", also:["CDA","FAR"] },
  { term:"J&A", full:"Justification and Approval", cat:"Contract Types", def:"A required document when the government uses other than full and open competition. FAR Part 6 requires the contracting officer and higher approval authority to justify the use of limited competition (e.g., sole source, limited sources). J&As are public documents and can be used to research an agency's procurement strategy.", also:["Sole Source","CICA"] },

  // ── ACQUISITION PROCESS ──────────────────────────────────────────────────
  { term:"SOW", full:"Statement of Work", cat:"Acquisition Process", def:"A detailed, prescriptive description of what the contractor must do — inputs, tasks, deliverables, timelines, and performance standards. The government writes the SOW; contractors must perform exactly what it says. Ambiguous SOW language is a primary source of constructive change claims and disputes.", also:["PWS","SOO","Constructive Change"] },
  { term:"PWS", full:"Performance Work Statement", cat:"Acquisition Process", def:"An outcome-based description of what the government needs — what results it wants, not how to achieve them. Gives the contractor flexibility in approach. Evaluated under a Quality Assurance Surveillance Plan. Used when the government wants to encourage innovation and let contractors propose their own solutions.", also:["SOW","SOO"] },
  { term:"SOO", full:"Statement of Objectives", cat:"Acquisition Process", def:"The most flexible requirements format — a high-level description of government goals and objectives. Contractors propose their own PWS or SOW as part of the proposal. Used when the government wants market-driven solutions and maximum contractor creativity. Requires more sophisticated evaluation by the government.", also:["PWS","SOW"] },
  { term:"RFP", full:"Request for Proposals", cat:"Acquisition Process", def:"The solicitation document used in negotiated procurement (FAR Part 15). The RFP contains the statement of work, evaluation factors (Section M), proposal instructions (Section L), and contract terms. Award is based on best value, which may consider technical, management, past performance, and price factors. The RFP is a legally significant document — its terms bind both parties once a contract is formed.", also:["IFB","RFQ","Section L","Section M"] },
  { term:"IFB", full:"Invitation for Bids", cat:"Acquisition Process", def:"The solicitation document used in sealed bidding (FAR Part 14). All responsive bids are opened publicly; award goes to the lowest responsive and responsible bidder. Price is the only evaluation criterion. No discussions, no negotiations. Used when requirements are clear and price is the only meaningful differentiator — common in construction.", also:["RFP","Responsiveness","Responsibility"] },
  { term:"RFQ", full:"Request for Quotations", cat:"Acquisition Process", def:"A solicitation document used for simplified acquisitions (under FAR Part 13) or commercial item acquisitions. Less formal than an RFP or IFB. A quotation in response to an RFQ is not an offer — award is made by issuing a purchase order, which is the government's offer that the vendor then accepts by performance.", also:["RFP","SAP"] },
  { term:"RFI", full:"Request for Information", cat:"Acquisition Process", def:"A pre-solicitation market research tool. The government issues an RFI (also called a Sources Sought notice) to understand what capabilities exist in the market, gauge small business availability, and refine its requirements before issuing a formal solicitation. Responding to an RFI does not make a company an offeror — there is no award at the RFI stage.", also:["SAM","Sources Sought"] },
  { term:"Section L", full:"Section L — Instructions to Offerors", cat:"Acquisition Process", def:"The RFP section that tells offerors exactly how to prepare and submit their proposal: page limits, formatting requirements, what to include in each volume, submission deadline, and address. Non-compliance with Section L requirements can make a proposal technically unacceptable.", also:["Section M","RFP","Compliance Matrix"] },
  { term:"Section M", full:"Section M — Evaluation Factors", cat:"Acquisition Process", def:"The RFP section that describes how the government will evaluate proposals: the evaluation factors (technical, management, past performance, price), their relative weights, and the standards for each rating level. Section M is the roadmap for winning. Contractors who do not write their proposals directly to Section M criteria consistently underperform.", also:["Section L","RFP","LPTA","Best Value"] },
  { term:"LPTA", full:"Lowest Price Technically Acceptable", cat:"Acquisition Process", def:"An evaluation approach where the government awards to the offeror with the lowest price among those whose proposals are rated technically acceptable. There is no trade-off between technical merit and price — once technically acceptable, only price determines award. LPTA is controversial because it drives prices down at potential cost to quality.", also:["Best Value","Section M"] },
  { term:"Best Value", full:"Best Value Source Selection", cat:"Acquisition Process", def:"An evaluation approach where the government trades off technical merit, past performance, and price to select the offer representing the best overall value. A higher-priced proposal can win if its technical advantages justify the premium. Best value gives evaluators more discretion — and gives protesters more grounds to challenge evaluation methodology.", also:["LPTA","Section M","Bid Protest"] },
  { term:"SAP", full:"Simplified Acquisition Procedures", cat:"Acquisition Process", def:"Streamlined procurement procedures under FAR Part 13 for acquisitions below the Simplified Acquisition Threshold (currently $250,000). Reduced competition requirements, faster timelines, less paperwork. Micro-purchases (currently under $10,000) require essentially no competition at all.", also:["SAT","RFQ"] },
  { term:"SAT", full:"Simplified Acquisition Threshold", cat:"Acquisition Process", def:"Currently $250,000 (subject to periodic adjustment). Acquisitions below this threshold may use Simplified Acquisition Procedures. Acquisitions above require more formal competition. The SAT also affects small business set-aside rules and other thresholds throughout the FAR.", also:["SAP"] },
  { term:"Compliance Matrix", full:"Compliance Matrix", cat:"Acquisition Process", def:"A working document used during proposal preparation that maps each requirement in the solicitation's Section L and Section M to a proposal section and response. Ensures no requirement is missed and that the proposal is structured to address every evaluation criterion. Building a compliance matrix before writing the proposal is a core practice skill.", also:["Section L","Section M","RFP"] },
  { term:"FOIA", full:"Freedom of Information Act", cat:"Acquisition Process", def:"Federal law (5 U.S.C. § 552) requiring federal agencies to disclose records upon public request, with specific exemptions. Exemption 4 protects trade secrets and confidential commercial information — the primary exemption contractors rely on to protect proposal data. Competitors routinely use FOIA to obtain post-award contract information including pricing.", also:["ORA","Trade Secret"] },
  { term:"ORA", full:"Open Records Act", cat:"Acquisition Process", def:"Georgia's state-law equivalent of FOIA (O.C.G.A. § 50-18-70 et seq.). Requires Georgia state agencies to disclose public records on request. Contractors submitting proposals on DOAS procurements must designate proprietary pricing and technical data as trade secrets at submission time or lose protection. After award, proposals generally become public records.", also:["FOIA","DOAS","Trade Secret"] },

  // ── KEY GOVERNMENT PLAYERS ───────────────────────────────────────────────
  { term:"CO", full:"Contracting Officer", cat:"Government Players", def:"The only government official with legal authority to enter into, administer, and terminate contracts on behalf of the government. A CO's authority is defined by a warrant issued by the agency. Only a CO can order contract changes, issue modifications, make final decisions on claims, and bind the government to contractual obligations. Direction from anyone other than the CO is not legally binding unless the CO has formally delegated authority in writing.", also:["COR","ACO","Merrill Doctrine"] },
  { term:"COR", full:"Contracting Officer's Representative", cat:"Government Players", def:"A government official designated by the CO to monitor contractor performance, review deliverables, and serve as the primary day-to-day contact. The COR cannot direct changes, authorize extra work, modify contract terms, or bind the government. A contractor who follows a COR's informal direction to do something outside the contract scope does so at its own risk — this is the classic constructive change scenario.", also:["CO","ACO","Constructive Change"] },
  { term:"ACO", full:"Administrative Contracting Officer", cat:"Government Players", def:"A CO specifically designated to administer a contract during performance — handling modifications, monitoring compliance, resolving issues — as distinct from the PCO who awarded the contract. On large DoD contracts, DCMA provides ACO services. The ACO has CO authority for administration but may not have authority for all modifications.", also:["CO","PCO","DCMA"] },
  { term:"PCO", full:"Procuring Contracting Officer", cat:"Government Players", def:"The CO responsible for the award of a contract — conducting the source selection, evaluating proposals, and making the award decision. Distinct from the ACO who administers the contract post-award. On large programs, these are typically different individuals.", also:["ACO","CO"] },
  { term:"DCAA", full:"Defense Contract Audit Agency", cat:"Government Players", def:"The DoD agency responsible for auditing contractor financial records, accounting systems, and cost proposals. DCAA audits are required for cost-reimbursement contracts and large procurements. A negative DCAA audit — finding that a contractor's accounting system is inadequate — can delay award or trigger payment withholding. Contractors doing significant DoD cost-reimbursement work need DCAA-compliant accounting systems.", also:["DCMA","CAS","Allowable Costs"] },
  { term:"DCMA", full:"Defense Contract Management Agency", cat:"Government Players", def:"The DoD agency that provides contract administration services (ACO functions) for large DoD contracts. DCMA monitors contractor performance, approves purchasing systems, reviews business systems, and ensures compliance with contract terms. Having a DCMA-administered contract is a significant compliance requirement.", also:["DCAA","ACO"] },
  { term:"SBA", full:"Small Business Administration", cat:"Government Players", def:"Federal agency responsible for administering small business programs including 8(a), HUBZone, SDVOSB, and WOSB certifications; establishing NAICS-based size standards; and adjudicating size protests and OHA appeals. The SBA also issues regulations at 13 C.F.R. governing small business program eligibility.", also:["8(a)","HUBZone","SDVOSB","WOSB","OHA"] },
  { term:"OHA", full:"Office of Hearings and Appeals", cat:"Government Players", def:"The SBA tribunal that adjudicates appeals of size determinations, 8(a) program decisions, and HUBZone eligibility decisions. OHA decisions are published and constitute important precedent on small business eligibility rules. When a competitor challenges a contractor's small business size certification, the appeal eventually goes to OHA.", also:["SBA","Affiliation","Ostensible Subcontractor Rule"] },
  { term:"GAO", full:"Government Accountability Office", cat:"Government Players", def:"An independent legislative branch agency that serves as the primary federal bid protest forum. GAO's Procurement Law Division reviews protests of federal solicitations and contract awards, issues decisions within 100 days (65 days express), and can recommend corrective action. GAO recommendations are advisory, not legally binding, but agencies follow them in over 90% of cases.", also:["Bid Protest","Automatic Stay","COFC"] },
  { term:"SDO", full:"Suspension and Debarment Official", cat:"Government Players", def:"The official at each federal agency with authority to suspend and debar contractors. SDOs exercise broad discretion in assessing present responsibility. When a contractor receives a Notice of Proposed Debarment, the SDO evaluates the contractor's response and decides whether to proceed with debarment. The SDO is also responsible for considering mitigating factors including remediation.", also:["Debarment","Suspension","Present Responsibility"] },

  // ── SMALL BUSINESS PROGRAMS ──────────────────────────────────────────────
  { term:"8(a)", full:"8(a) Business Development Program", cat:"Small Business", def:"SBA program providing sole-source and set-aside contracting opportunities to small disadvantaged businesses for a 9-year term. Eligibility requires 51%+ ownership by a socially and economically disadvantaged individual. The program is divided into a 4-year developmental stage and 5-year transitional stage. Sole-source thresholds: ~$4.5M for services, ~$7M for manufacturing. One of the most powerful competitive tools in federal contracting.", also:["SBA","8(a) Graduation","Small Business Set-Aside"] },
  { term:"HUBZone", full:"Historically Underutilized Business Zone", cat:"Small Business", def:"SBA program for small businesses located in and employing workers from designated economically distressed areas. Requires the business to be principally located in a HUBZone and at least 35% of employees to reside in HUBZone areas. Provides set-aside competition and a 10% price evaluation preference in full and open competition. Geographic compliance is an ongoing obligation.", also:["SBA","Small Business Set-Aside"] },
  { term:"SDVOSB", full:"Service-Disabled Veteran-Owned Small Business", cat:"Small Business", def:"Small business at least 51% owned and controlled by one or more service-disabled veterans, certified through SBA's VetCert program. Provides set-aside and sole-source opportunities. The VA has an enhanced veteran preference program under the Veterans Benefits Act. Control — meaning both strategic decisions and day-to-day management — must be exercised by the service-disabled veteran.", also:["VOSB","SBA","WOSB"] },
  { term:"WOSB", full:"Women-Owned Small Business", cat:"Small Business", def:"Small business at least 51% owned and controlled by one or more women, eligible for WOSB set-asides in industries where women-owned businesses are underrepresented. EDWOSB (Economically Disadvantaged WOSB) is a subset with income and asset limits. Certification through SBA's WOSB program is required.", also:["EDWOSB","SBA","SDVOSB"] },
  { term:"EDWOSB", full:"Economically Disadvantaged Women-Owned Small Business", cat:"Small Business", def:"A subset of the WOSB program for women-owned small businesses whose owner's personal net worth, adjusted gross income, and total assets fall below SBA-specified thresholds. EDWOSB set-asides are available in a broader range of NAICS codes than basic WOSB set-asides.", also:["WOSB","SBA"] },
  { term:"NAICS", full:"North American Industry Classification System", cat:"Small Business", def:"The industry classification system used to define small business size standards and categorize government contract work. Each NAICS code has a specific size standard (revenue or employee-based). The NAICS code assigned to a solicitation determines which size standard applies and whether set-aside requirements are triggered. Choosing the right NAICS codes for registration is a strategic decision.", also:["SBA","SAM","FFP"] },
  { term:"Affiliation", full:"Affiliation (SBA)", cat:"Small Business", def:"A legal relationship between two businesses that causes them to be treated as a single entity for size purposes, combining their revenues or employees. Can arise from common ownership/control, economic dependence, identity of interest, or the ostensible subcontractor rule. Affiliation can disqualify a contractor from small business set-asides. 13 C.F.R. § 121.103.", also:["Ostensible Subcontractor Rule","SBA","OHA"] },
  { term:"Ostensible Subcontractor Rule", full:"Ostensible Subcontractor Rule", cat:"Small Business", def:"SBA affiliation rule that disqualifies a small business prime contractor when its large business subcontractor is performing the primary and vital requirements of the contract — effectively making the sub the real prime. The rule prevents small business set-asides from being captured by large businesses using small business fronts. 13 C.F.R. § 121.103(h)(4).", also:["Affiliation","SBA","OHA"] },
  { term:"DBE", full:"Disadvantaged Business Enterprise", cat:"Small Business", def:"Federal program requiring recipients of federal transportation funds (e.g., GDOT on highway projects) to set participation goals for small disadvantaged businesses. Different from SBA programs — DBE certification is state-administered through GDOT's Office of Diversity and Equal Opportunity. Relevant for any construction client working on federally-funded Georgia transportation projects.", also:["GDOT","SDVOSB","DOAS"] },

  // ── CLAIMS & DISPUTES ────────────────────────────────────────────────────
  { term:"CDA", full:"Contract Disputes Act", cat:"Claims & Disputes", def:"41 U.S.C. §§ 7101-7109. The federal statute governing formal dispute resolution for post-award contract claims. Establishes the pathway from certified claim → Contracting Officer's Final Decision → appeal to Board of Contract Appeals or Court of Federal Claims. The CDA does not apply to bid protests, grants, or Other Transaction Agreements.", also:["COFD","ASBCA","CBCA","COFC","REA"] },
  { term:"REA", full:"Request for Equitable Adjustment", cat:"Claims & Disputes", def:"An informal contractor request asking the government to adjust the contract price or schedule to account for changed circumstances — government-directed changes, differing site conditions, government-caused delays, etc. An REA is not a formal CDA claim and does not require certification. Most disputes are resolved at the REA stage through CO negotiation. Filing an REA preserves rights while seeking informal resolution.", also:["CDA","Equitable Adjustment","Certified Claim"] },
  { term:"Equitable Adjustment", full:"Equitable Adjustment", cat:"Claims & Disputes", def:"A modification to the contract price and/or schedule to compensate the contractor for the cost and time impact of a government-directed change, constructive change, or other compensable government action. An equitable adjustment aims to put the contractor in the same financial position it would have been in absent the change — no better, no worse.", also:["REA","Changes Clause","Constructive Change"] },
  { term:"COFD", full:"Contracting Officer's Final Decision", cat:"Claims & Disputes", def:"The CO's written decision on a certified contractor claim or a government demand for money. The COFD triggers the contractor's appeal rights: 90 days to the Board of Contract Appeals, or 12 months to the Court of Federal Claims. Missing these deadlines is fatal — the COFD becomes final and unappealable. The COFD must state the contractor's appeal rights.", also:["CDA","ASBCA","CBCA","COFC"] },
  { term:"ASBCA", full:"Armed Services Board of Contract Appeals", cat:"Claims & Disputes", def:"The appeal tribunal for DoD contract disputes under the CDA. Cases are decided by administrative law judges with significant GovCon expertise. The ASBCA has its own rules of procedure. Contractors have 90 days from the COFD to file. ASBCA decisions are published and constitute important precedent. Admission to practice before the ASBCA requires a separate application.", also:["CBCA","COFC","CDA"] },
  { term:"CBCA", full:"Civilian Board of Contract Appeals", cat:"Claims & Disputes", def:"The appeal tribunal for most civilian agency (non-DoD) contract disputes under the CDA, located at GSA. Like the ASBCA, it has its own rules of procedure, its own bar, and experienced administrative law judges. The 90-day appeal window from COFD applies here as well.", also:["ASBCA","COFC","CDA"] },
  { term:"COFC", full:"Court of Federal Claims", cat:"Claims & Disputes", def:"An Article I federal court with jurisdiction over money claims against the United States government, including CDA contract claims and bid protests. Located in Washington, D.C. The appeal window from COFD is 12 months (vs. 90 days for the boards). COFC applies federal rules of civil procedure and conducts de novo review. Practitioners must be admitted to the COFC bar.", also:["ASBCA","CDA","Tucker Act"] },
  { term:"Constructive Change", full:"Constructive Change Doctrine", cat:"Claims & Disputes", def:"When the government effectively changes the contract scope, schedule, or cost without issuing a formal change order, the contractor may be entitled to an equitable adjustment as if a formal change had been ordered. Common sources: inspector rejecting conforming work; COR directing extra work; defective government-furnished specs; government-caused access delays. Contractor must document, assert promptly, and continue performance.", also:["Changes Clause","REA","COR"] },
  { term:"Changes Clause", full:"Changes Clause (FAR 52.243-1)", cat:"Claims & Disputes", def:"The contractual provision giving the CO unilateral authority to order changes within the general scope of a fixed-price contract. When exercised, the contractor is entitled to an equitable adjustment in price and schedule. The clause defines the permissible scope of changes: drawings, designs, specifications, method of shipment, place of delivery, and similar items.", also:["Constructive Change","REA","Equitable Adjustment"] },
  { term:"T4C", full:"Termination for Convenience", cat:"Claims & Disputes", def:"The government's right to terminate a contract at any time because it is in the government's interest — no contractor default required. Implied into virtually every FAR-based contract by the Christian Doctrine. Recovery is limited to costs incurred, overhead, and reasonable profit on work performed. Anticipated profit on unperformed work is not recoverable. Challenging a T4C as improper requires showing government bad faith — an extremely high bar (Kregowski).", also:["T4D","Christian Doctrine","Kregowski","FAR 52.249-2"] },
  { term:"T4D", full:"Termination for Default", cat:"Claims & Disputes", def:"The government's right to terminate a contract when the contractor fails to make progress, fails to deliver on time, or otherwise fails to perform contractual obligations. In a T4D, the contractor receives nothing for unperformed work and may owe reprocurement costs — the difference between what it would have cost the original contractor and what it costs to re-award the contract. A wrongful T4D converted to a T4C changes the damage calculation entirely.", also:["T4C","Reprocurement Costs"] },
  { term:"Certified Claim", full:"Certified Claim (CDA)", cat:"Claims & Disputes", def:"A formal claim submitted to the CO under the CDA, with certification required for claims over $100,000. The contractor must certify: the claim is made in good faith; supporting data are accurate and complete to the best of knowledge and belief; the amount reflects the contractor's honest assessment of its entitlement. False certification creates both CDA and FCA liability.", also:["CDA","COFD","REA"] },

  // ── BID PROTESTS ─────────────────────────────────────────────────────────
  { term:"Bid Protest", full:"Bid Protest", cat:"Bid Protests", def:"A formal challenge to a federal agency's solicitation terms or contract award decision, filed with GAO, the Court of Federal Claims, or the procuring agency. The protester must be an 'interested party' with direct economic interest in the procurement. GAO protests must be filed within 10 calendar days of the basis for protest (5 days post-debriefing) to preserve the automatic stay.", also:["GAO","Automatic Stay","Interested Party","COFC"] },
  { term:"Automatic Stay", full:"Automatic Stay (Bid Protest)", cat:"Bid Protests", def:"When a bid protest is filed at GAO within 10 calendar days of contract award (or 5 days after a required debriefing), the agency is legally required to suspend contract performance pending GAO's decision. The automatic stay is the most powerful feature of a timely GAO protest — it freezes the awardee's work and creates strong settlement incentives for all parties.", also:["Bid Protest","GAO","Override"] },
  { term:"Interested Party", full:"Interested Party (Bid Protest Standing)", cat:"Bid Protests", def:"The standing requirement for a GAO bid protest. The protester must be an actual or prospective offeror whose direct economic interest is affected by the award or failure to award. A company that would not have won even if the government's error were corrected may lack standing. Analyzing standing is the first step in evaluating any protest.", also:["Bid Protest","GAO"] },
  { term:"Agency Report", full:"Agency Report (GAO Protest)", cat:"Bid Protests", def:"The government's written defense of a challenged procurement decision, submitted to GAO within 30 days of the protest filing. The Agency Report includes the administrative record of the procurement — the evaluation documents, scoring sheets, source selection decision, and relevant correspondence. The protester has 10 days to file comments after receiving the Agency Report.", also:["GAO","Bid Protest"] },
  { term:"Corrective Action", full:"Corrective Action (Bid Protest)", cat:"Bid Protests", def:"The agency's voluntary or GAO-recommended remedy when a protest is sustained or when the agency acknowledges a procurement error. Corrective action can range from amending the solicitation to re-evaluating proposals to re-soliciting the requirement entirely. The nature of the corrective action must be 'reasonable' to address the identified error.", also:["GAO","Bid Protest","Sustain"] },
  { term:"Solicitation Ambiguity", full:"Solicitation Ambiguity (Patent vs. Latent)", cat:"Bid Protests", def:"Patent ambiguity: an obvious inconsistency or unclear term that a reasonable offeror would recognize at solicitation review time — must be protested pre-award or the objection is waived (solicitation ambiguity waiver rule). Latent ambiguity: an unclear term that only becomes apparent after award — can be raised post-award. This distinction is critical for deciding when to file a pre-award protest.", also:["Bid Protest","GAO","Solicitation Waiver Rule"] },
  { term:"Solicitation Waiver Rule", full:"Solicitation Ambiguity Waiver Rule", cat:"Bid Protests", def:"GAO rule that a protester who was aware (or should have been aware) of a solicitation defect before the proposal submission deadline must raise it in a pre-award protest or the ground is permanently waived. Prevents contractors from gambling on a favorable interpretation and only complaining after losing. Requires attorneys reviewing solicitations to assess protest grounds immediately.", also:["Solicitation Ambiguity","Bid Protest","GAO"] },
  { term:"Debriefing", full:"Post-Award Debriefing", cat:"Bid Protests", def:"A meeting or written explanation from the agency to an unsuccessful offeror explaining why the offeror was not selected. Required by FAR 15.505-15.506 for competitive acquisitions. The debriefing provides the factual basis for potential bid protest grounds. Requesting a debriefing starts the 5-day protest window (vs. 10 days without a debriefing) — timing the debriefing request strategically is important.", also:["Bid Protest","GAO","Automatic Stay"] },

  // ── COMPLIANCE & ETHICS ──────────────────────────────────────────────────
  { term:"FCA", full:"False Claims Act", cat:"Compliance & Ethics", def:"31 U.S.C. §§ 3729-3733. The federal government's primary tool for combating contractor fraud. Prohibits knowingly presenting false or fraudulent claims for payment to the government. 'Knowingly' includes reckless disregard. Penalties: treble damages plus $13,000–$27,000 per false claim. Includes qui tam provisions allowing private relators to sue on the government's behalf. FCA recovered $6.8 billion in FY2025.", also:["Qui Tam","Mandatory Disclosure","Debarment"] },
  { term:"Qui Tam", full:"Qui Tam (FCA)", cat:"Compliance & Ethics", def:"Latin for 'who as well.' The FCA provision (31 U.S.C. § 3730) allowing a private person — typically a current or former employee — to file an FCA lawsuit on behalf of the government and receive 15-30% of any recovery. Filed under seal while the DOJ investigates. The financial incentive for employees to report fraud is enormous. The constitutionality of qui tam under the Appointments Clause is currently being litigated, with the 11th Circuit raising questions.", also:["FCA","Mandatory Disclosure","11th Circuit"] },
  { term:"Mandatory Disclosure", full:"Mandatory Disclosure (FAR 52.203-13)", cat:"Compliance & Ethics", def:"FAR 52.203-13 requires contractors with contracts over $6M and performance periods over 120 days to timely disclose credible evidence of fraud, bribery, gratuities, or conflict of interest violations related to their federal contracts. Failure to disclose is itself an FCA violation. Creates a difficult decision when internal audits surface problems — disclosure triggers investigation but non-disclosure creates independent liability.", also:["FCA","FAR 52.203-13","Qui Tam"] },
  { term:"Debarment", full:"Debarment (FAR Part 9.4)", cat:"Compliance & Ethics", def:"Administrative action excluding a contractor or individual from receiving federal contracts and assistance for up to 3 years (longer for fraud). Grounds include fraud, FCA judgment, intentional failure to perform, and other evidence of lack of business integrity. The standard is 'present responsibility.' A contractor with robust remediation — fixing the problem, disciplining wrongdoers, strengthening compliance — can make a strong present responsibility argument. 30-day response deadline to a Notice of Proposed Debarment is hard.", also:["Suspension","Present Responsibility","SDO"] },
  { term:"Suspension", full:"Suspension (FAR Part 9.4)", cat:"Compliance & Ethics", def:"An interim exclusion from federal contracting pending investigation of serious misconduct. Suspension can be imposed immediately on less formal grounds than debarment and typically lasts no more than 12 months. A suspension is often the first step before a debarment proceeding. Because suspension operates pending investigation, the evidentiary standard is lower than for debarment.", also:["Debarment","SDO"] },
  { term:"Present Responsibility", full:"Present Responsibility", cat:"Compliance & Ethics", def:"The standard for debarment and suspension — the question is not just whether misconduct occurred in the past, but whether the contractor is currently responsible to perform government contracts. A contractor that has remediated — correcting systems failures, disciplining wrongdoers, implementing compliance controls, cooperating with investigators — can demonstrate present responsibility even after a serious compliance failure.", also:["Debarment","Suspension","SDO"] },
  { term:"CMMC", full:"Cybersecurity Maturity Model Certification", cat:"Compliance & Ethics", def:"DoD's framework for certifying contractor cybersecurity compliance at three levels. Level 1 (15 controls): annual self-assessment. Level 2 (110 NIST 800-171 controls): triennial third-party C3PAO assessment. Level 3 (NIST 800-172 + additional): government-led assessment. Being phased into DoD contracts through 2028. Contractors who falsely certify CMMC compliance face FCA liability.", also:["DFARS 7012","NIST 800-171","CUI"] },
  { term:"CUI", full:"Controlled Unclassified Information", cat:"Compliance & Ethics", def:"Sensitive government information that requires protection but is not classified. Examples: technical data, export-controlled information, personally identifiable information, law enforcement sensitive information. DFARS 252.204-7012 requires contractors who handle CUI on DoD contracts to implement NIST SP 800-171 security controls and report cyber incidents within 72 hours.", also:["CMMC","DFARS 7012","NIST 800-171"] },
  { term:"ITAR", full:"International Traffic in Arms Regulations", cat:"Compliance & Ethics", def:"Export control regulations (22 C.F.R. Parts 120-130) governing defense articles and defense services on the United States Munitions List. Defense contractors must register with the State Department's Directorate of Defense Trade Controls. Unauthorized export of ITAR-controlled items or technical data is a serious criminal offense. Many DoD contracts include ITAR compliance requirements.", also:["EAR","CUI"] },
  { term:"CAS", full:"Cost Accounting Standards", cat:"Compliance & Ethics", def:"18 standards issued by the Cost Accounting Standards Board governing how contractors allocate and account for costs on larger government cost-reimbursement contracts. CAS-covered contractors must disclose their accounting practices, apply them consistently, and comply with specific standards for cost allocation, depreciation, pension costs, and other areas. CAS noncompliance can result in payment disallowances.", also:["DCAA","CPFF","Allowable Costs"] },

  // ── LEGAL DOCTRINES ──────────────────────────────────────────────────────
  { term:"Christian Doctrine", full:"Christian Doctrine (G.L. Christian & Assocs. v. United States, 1963)", cat:"Legal Doctrines", def:"Mandatory regulatory clauses are incorporated into government contracts by operation of law — even if accidentally omitted from the written document. The doctrine originates from a case where the government omitted the Termination for Convenience clause from a military housing contract, then invoked it. The court held the clause was implied because it reflected mandatory procurement policy. No master list of Christian Doctrine clauses exists — applicability is contract-type- and agency-specific.", also:["T4C","Merrill Doctrine","FAR 52.249-2"] },
  { term:"Merrill Doctrine", full:"Merrill Doctrine (Federal Crop Ins. Corp. v. Merrill, 1947)", cat:"Legal Doctrines", def:"Apparent authority does not bind the federal government. Only government officials acting within their actual statutory and regulatory authority can bind the U.S. Published federal regulations are constructive notice — binding on contractors whether or not they actually read them. Originates from a SCOTUS case where a farmer's local government agent mistakenly promised crop insurance coverage that regulations prohibited. The government was not bound.", also:["CO","COR","Christian Doctrine"] },
  { term:"Contra Proferentem", full:"Contra Proferentem", cat:"Legal Doctrines", def:"Latin for 'against the drafter.' In government contracts, latent ambiguities in solicitation language are construed against the government (the drafter). The contractor can rely on a reasonable interpretation of ambiguous language. However, the contra proferentem doctrine only applies to latent ambiguity — patent ambiguity must be raised pre-award or it is waived.", also:["Solicitation Ambiguity","Patent Ambiguity","Latent Ambiguity"] },
  { term:"Four Corners Doctrine", full:"Four Corners Doctrine", cat:"Legal Doctrines", def:"Commercial contract law principle that contract meaning is determined solely from the written document. Government contracts depart significantly from this doctrine — incorporated-by-reference clauses, implied Christian Doctrine clauses, and constructive notice of regulations all add terms beyond the physical document. New GovCon attorneys must unlearn the four-corners mindset.", also:["Christian Doctrine","Merrill Doctrine"] },
  { term:"Tucker Act", full:"Tucker Act (28 U.S.C. § 1491)", cat:"Legal Doctrines", def:"The statute waiving the federal government's sovereign immunity for money claims exceeding $10,000, vesting jurisdiction in the Court of Federal Claims. The Tucker Act is the basis for COFC jurisdiction over both CDA contract appeals and bid protest cases. Without the Tucker Act, contractors generally could not sue the federal government for money.", also:["COFC","CDA","Sovereign Immunity"] },
  { term:"Sovereign Immunity", full:"Sovereign Immunity", cat:"Legal Doctrines", def:"The legal doctrine that the government cannot be sued without its consent. In government contracting, Congress has waived sovereign immunity in specific contexts — the CDA for contract disputes, the Tucker Act for money claims at COFC, and the Competition in Contracting Act for bid protests. Understanding the scope of these waivers is critical because courts interpret them narrowly.", also:["Tucker Act","CDA","CICA"] },
  { term:"CICA", full:"Competition in Contracting Act", cat:"Legal Doctrines", def:"41 U.S.C. § 3301. Requires federal agencies to use competitive procedures when acquiring property and services. CICA is the foundation for bid protest law — it gives interested parties the right to challenge non-competitive awards and solicitation defects. Exceptions to CICA's competition requirement must be documented in a Justification and Approval.", also:["J&A","Bid Protest","GAO"] },
  { term:"Responsiveness", full:"Responsiveness", cat:"Legal Doctrines", def:"A bid evaluation concept for sealed bidding (IFB) — a bid is responsive if it complies with all material requirements of the solicitation on its face. A non-responsive bid is rejected without further consideration, even if it is the lowest price. Minor informalities can be waived; material deviations cannot. Responsiveness is evaluated at the time of bid opening.", also:["IFB","Responsibility","Waiver of Minor Informality"] },
  { term:"Responsibility", full:"Contractor Responsibility", cat:"Legal Doctrines", def:"A pre-award determination that the selected contractor has the capability, financial resources, integrity, and record of past performance necessary to perform the contract. The CO must make a written affirmative responsibility determination before award. FAR Part 9.1 sets out the responsibility criteria. A 'nonresponsible' determination bars award without a small business referral to the SBA (for small business set-asides).", also:["Responsiveness","SBA Certificate of Competency"] },
  { term:"Privity of Contract", full:"Privity of Contract", cat:"Legal Doctrines", def:"The contractual relationship that exists between the parties to a contract. In government contracting, privity exists between the prime contractor and the government, and between the prime and its subcontractors — but NOT between subcontractors and the government. Subcontractors have no direct claim against the government under the CDA. They must flow claims through the prime contractor.", also:["Prime Contractor","Subcontractor","CDA"] },

  // ── GEORGIA STATE PROCUREMENT ─────────────────────────────────────────────
  { term:"DOAS", full:"Georgia Department of Administrative Services", cat:"Georgia State", def:"The Georgia state agency that administers most state procurement under O.C.G.A. § 50-5-50. DOAS operates the Georgia Procurement Registry, publishes the Georgia Procurement Manual, and adjudicates state bid protests. Three major categories of agencies operate outside DOAS: GDOT, the University System of Georgia, and the Georgia Technology Authority.", also:["GPR","Georgia Procurement Manual","GDOT"] },
  { term:"GPR", full:"Georgia Procurement Registry", cat:"Georgia State", def:"DOAS's online portal for vendor registration and state solicitation posting — Georgia's equivalent of SAM.gov. Vendors must be registered on the GPR to do business with DOAS-administered state agencies. Solicitations are posted here, and contractors submit responses through the system.", also:["DOAS","SAM"] },
  { term:"GDOT", full:"Georgia Department of Transportation", cat:"Georgia State", def:"State agency responsible for planning, constructing, and maintaining Georgia's transportation system. GDOT does not fall under DOAS — it has its own procurement procedures. Because most GDOT projects receive federal highway funds, federal requirements (Davis-Bacon, Buy America, DBE goals) flow down to GDOT construction contracts. GDOT uses a prequalification system for construction contractors.", also:["DOAS","DBE","Davis-Bacon Act"] },
  { term:"USG (University System)", full:"University System of Georgia", cat:"Georgia State", def:"The system of 26 public colleges and universities in Georgia, governed by the Board of Regents. USG institutions procure under Board of Regents policies, not DOAS rules. Each institution has its own procurement office. Contracts with USG institutions — for construction, IT, professional services — are governed by USG contract terms, not standard DOAS templates.", also:["DOAS","GTA"] },
  { term:"GTA", full:"Georgia Technology Authority", cat:"Georgia State", def:"State agency that manages IT procurement for Georgia state agencies. GTA operates statewide IT contract vehicles that agencies can use without separate competition. Similar in function to GSA Schedule contracts at the federal level. Vendors seeking to provide IT services to Georgia state agencies often work through GTA-established contracts.", also:["DOAS","MAS"] },
  { term:"Georgia Procurement Manual", full:"Georgia Procurement Manual (DOAS)", cat:"Georgia State", def:"DOAS's comprehensive guide to Georgia state procurement — the primary practical reference for attorneys and contractors navigating state contracting. Covers procurement methods, solicitation procedures, award processes, contract templates (DOAS standard forms), and protest procedures. Available free at doas.georgia.gov. Essential reading for any Georgia state procurement matter.", also:["DOAS","OCGA","GPR"] },
  { term:"Davis-Bacon Act", full:"Davis-Bacon Act (40 U.S.C. §§ 3141-3148)", cat:"Georgia State", def:"Federal statute requiring contractors on federally funded construction projects over $2,000 to pay workers prevailing wages and fringe benefits as determined by the Department of Labor. Applies to GDOT projects receiving federal highway funds. The CO must include the Davis-Bacon clause in covered contracts. Violations can result in contract termination and contractor debarment.", also:["GDOT","Service Contract Act","Walsh-Healey"] },
  { term:"Service Contract Act", full:"McNamara-O'Hara Service Contract Act (41 U.S.C. §§ 6701-6707)", cat:"Georgia State", def:"Federal statute requiring contractors on federal service contracts over $2,500 to pay employees wage rates and fringe benefits no less than prevailing rates in the locality as determined by the Department of Labor. Applies to contracts for services — cleaning, security, maintenance, food service. Both Davis-Bacon (construction) and SCA (services) are significant compliance obligations that can be showstoppers in the compliance matrix.", also:["Davis-Bacon Act","Compliance Matrix"] },
];

function Module14() {
  const [search, setSearch] = React.useState('');
  const [catFilter, setCatFilter] = React.useState('All');
  const [selected, setSelected] = React.useState(null);
  const [learned, setLearned] = useLocalStorage('m14_learned', {});

  const cats = ['All', ...Array.from(new Set(GLOSSARY_TERMS.map(t => t.cat)))];

  const filtered = GLOSSARY_TERMS.filter(t => {
    const matchCat = catFilter === 'All' || t.cat === catFilter;
    const q = search.toLowerCase();
    const matchSearch = !q || t.term.toLowerCase().includes(q) || (t.full||'').toLowerCase().includes(q) || t.def.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  // Daily terms: rotate 5 terms per day based on date
  const today = new Date();
  const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
  const groupSize = 5;
  const groupCount = Math.floor(GLOSSARY_TERMS.length / groupSize);
  const groupIndex = dayOfYear % groupCount;
  const dailyTerms = GLOSSARY_TERMS.slice(groupIndex * groupSize, groupIndex * groupSize + groupSize);
  const dateStr = today.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});

  const toggleLearned = (term) => setLearned(p => ({...p, [term]: !p[term]}));
  const learnedCount = Object.keys(learned).filter(k => learned[k]).length;
  const catColors = {
    'Regulations':'#3b82f6','Contract Types':'#8b5cf6','Acquisition Process':'#06b6d4',
    'Government Players':'#f59e0b','Small Business':'#10b981','Claims & Disputes':'#ef4444',
    'Bid Protests':'#f97316','Compliance & Ethics':'#ec4899','Legal Doctrines':'#6366f1','Georgia State':'#84cc16'
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">Module 14</div>
        <h1>GovCon Glossary &amp; Daily Terms</h1>
        <p>{GLOSSARY_TERMS.length} terms across 10 categories. 5 new terms rotate every morning automatically.</p>
      </div>

      {/* Daily terms card */}
      <div style={{background:'var(--navy)',borderRadius:10,padding:'18px 20px',marginBottom:22}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div>
            <div style={{color:'var(--gold)',fontSize:11,fontWeight:700,letterSpacing:'0.6px',textTransform:'uppercase',marginBottom:3}}>☀️ TODAY'S 5 TERMS — {dateStr.toUpperCase()}</div>
            <div style={{color:'rgba(255,255,255,0.65)',fontSize:12}}>New terms every morning. Add these to your 30-min study session.</div>
          </div>
          <div style={{color:'var(--gold)',fontSize:13,fontWeight:700}}>{learnedCount} learned today</div>
        </div>
        <div style={{display:'grid',gap:8}}>
          {dailyTerms.map(t => {
            const done = learned[t.term];
            return (
              <div key={t.term} style={{background:'rgba(255,255,255,0.07)',borderRadius:7,padding:'11px 14px',borderLeft:`3px solid ${catColors[t.cat]||'var(--gold)'}`,cursor:'pointer'}}
                onClick={() => setSelected(selected?.term === t.term ? null : t)}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                      <span style={{color:'white',fontWeight:700,fontSize:14}}>{t.term}</span>
                      {t.full && t.full !== t.term && <span style={{color:'rgba(255,255,255,0.55)',fontSize:11}}>{t.full}</span>}
                      <span style={{background:catColors[t.cat]||'var(--gold)',color:'white',fontSize:10,fontWeight:700,padding:'1px 6px',borderRadius:3}}>{t.cat}</span>
                    </div>
                    {selected?.term === t.term
                      ? <p style={{color:'rgba(255,255,255,0.85)',fontSize:13,lineHeight:1.65,margin:'6px 0 0'}}>{t.def}</p>
                      : <p style={{color:'rgba(255,255,255,0.6)',fontSize:12,margin:0,lineHeight:1.4}}>{t.def.substring(0,90)}…</p>
                    }
                  </div>
                  <button onClick={(e)=>{e.stopPropagation();toggleLearned(t.term);}}
                    style={{marginLeft:12,flexShrink:0,background:done?'#10b981':'rgba(255,255,255,0.12)',color:'white',border:'none',borderRadius:5,padding:'5px 10px',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                    {done ? '✓ Learned' : 'Mark Learned'}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Full glossary */}
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <input
          value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search terms, abbreviations, definitions…"
          style={{flex:1,minWidth:220,padding:'9px 13px',borderRadius:6,border:'1px solid var(--border)',fontSize:13,outline:'none'}} />
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {cats.map(c => (
            <button key={c} onClick={()=>setCatFilter(c)}
              style={{background:catFilter===c?'var(--navy)':'white',color:catFilter===c?'white':'var(--charcoal)',border:'1px solid var(--border)',borderRadius:5,padding:'6px 10px',fontSize:11,fontWeight:600,cursor:'pointer'}}>
              {c}
            </button>
          ))}
        </div>
      </div>
      <div style={{color:'var(--text-muted)',fontSize:12,marginBottom:12}}>{filtered.length} of {GLOSSARY_TERMS.length} terms</div>

      <div style={{display:'grid',gap:8}}>
        {filtered.map(t => {
          const isOpen = selected?.term === t.term;
          const done = learned[t.term];
          return (
            <div key={t.term}
              style={{background:'white',border:`1px solid ${isOpen?catColors[t.cat]||'var(--navy)':'var(--border)'}`,borderRadius:8,overflow:'hidden',
                borderLeft:`4px solid ${catColors[t.cat]||'#94a3b8'}`}}>
              <div style={{padding:'12px 14px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}
                onClick={()=>setSelected(isOpen?null:t)}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                    <span style={{fontWeight:700,fontSize:14,color:'var(--navy)'}}>{t.term}</span>
                    {t.full && t.full !== t.term && <span style={{color:'var(--text-muted)',fontSize:12}}>{t.full}</span>}
                    <span style={{background:catColors[t.cat]+'22',color:catColors[t.cat]||'#64748b',fontSize:10,fontWeight:700,padding:'1px 6px',borderRadius:3}}>{t.cat}</span>
                    {done && <span style={{background:'#d1fae5',color:'#065f46',fontSize:10,fontWeight:700,padding:'1px 6px',borderRadius:3}}>✓ Learned</span>}
                  </div>
                  {!isOpen && <div style={{color:'var(--text-muted)',fontSize:12,marginTop:3}}>{t.def.substring(0,100)}…</div>}
                </div>
                <span style={{color:'var(--text-muted)',fontSize:16,marginLeft:8}}>{isOpen?'▲':'▼'}</span>
              </div>
              {isOpen && (
                <div style={{padding:'0 14px 14px',borderTop:'1px solid #f1f5f9'}}>
                  <p style={{fontSize:13,lineHeight:1.7,color:'var(--charcoal)',marginBottom:12}}>{t.def}</p>
                  {t.also && t.also.length > 0 && (
                    <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      <span style={{fontSize:11,color:'var(--text-muted)',fontWeight:600}}>SEE ALSO:</span>
                      {t.also.map(a => (
                        <button key={a} onClick={()=>{setSearch(a);setCatFilter('All');setSelected(null);}}
                          style={{background:'#f1f5f9',border:'none',borderRadius:4,padding:'3px 8px',fontSize:11,color:'var(--navy)',cursor:'pointer',fontWeight:600}}>
                          {a}
                        </button>
                      ))}
                    </div>
                  )}
                  <div style={{marginTop:10}}>
                    <button onClick={()=>toggleLearned(t.term)}
                      style={{background:done?'#d1fae5':' var(--navy)',color:done?'#065f46':'white',border:'none',borderRadius:5,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
                      {done ? '✓ Marked as Learned' : 'Mark as Learned'}
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
