    id: 8,
    title: "Georgia State and Local Procurement: The Parallel System",
    duration: "~20 min",
    script: `Good morning. This week we are focusing on Georgia state and local government procurement. If your practice is primarily federal, you might be tempted to skip this week. I encourage you not to. For a Georgia-based attorney, the state and local procurement market is substantial, the legal issues are distinct and interesting, and many of your clients will operate in both the federal and state procurement spaces simultaneously. Understanding both systems — and knowing when one applies rather than the other — is a genuine competitive advantage in a Georgia GovCon practice.

Let me begin with the foundational distinction that surprises many attorneys new to state procurement: the regulatory and legal framework for Georgia state contracting is completely independent from federal procurement law. When you are dealing with a contract between a Georgia state agency and a vendor, the FAR does not apply. The Contract Disputes Act does not apply. The GAO has no jurisdiction. The Court of Federal Claims has no jurisdiction. Everything is state law, state regulation, state procedure, and state courts. There is an important exception I will get to — when a state contract is funded by federal money, federal requirements can flow down — but as a baseline, Georgia state procurement is an entirely separate legal world.

The cornerstone of Georgia state procurement law is the State Purchasing Act, codified at O.C.G.A. Section 50-5-50 through 50-5-83. This statute is the Georgia legislature's framework for how the state of Georgia competes for and awards contracts. It establishes the fundamental principles: open competition, best value, equal opportunity, and accountability. It authorizes the Department of Administrative Services — DOAS — to administer state purchasing and to promulgate rules implementing the State Purchasing Act. And it provides the legal framework for vendor registration, competitive solicitations, contract awards, and disputes.

DOAS is the most important state procurement agency in Georgia. The State Purchasing Division of DOAS administers the Georgia Procurement Registry, which is the state's equivalent of the federal SAM.gov — the online portal where vendors register and where state solicitations are posted. DOAS also publishes the Georgia Procurement Manual, which is a comprehensive practical guide to how the state conducts procurement. For anyone advising clients on Georgia state contracting, the Georgia Procurement Manual is the first place to look. It covers the procurement lifecycle from requirements development through contract award and administration, describes the various procurement methods available to state agencies, sets out the rules for competitive bidding and competitive sealed proposals, and provides the procedures for bid protests. The manual is available free on the DOAS website.

Now here is something critically important that the Georgia Procurement Manual will not prominently advertise: not all Georgia state agencies fall under DOAS. Three major categories of agencies operate under their own procurement frameworks. The first is the Georgia Department of Transportation, GDOT. GDOT is a major source of state construction contracts — highway construction, bridge construction, maintenance contracts. Because most GDOT projects receive federal highway funds from the Federal Highway Administration, GDOT must comply with federal requirements including Davis-Bacon prevailing wage requirements, Buy America requirements for construction materials, and federal Disadvantaged Business Enterprise requirements. GDOT also has its own procurement rules, its own vendor qualification process, and its own prequalification requirements for construction contractors. If your client wants to work with GDOT, the relevant starting point is GDOT's own procurement website, not the DOAS manual.

The second major exception is the University System of Georgia. USG institutions — the University of Georgia, Georgia Tech, Georgia State, and the rest of the system's twenty-six institutions — procure under rules established by the Board of Regents. Each USG institution has its own procurement office, and while the Board of Regents sets systemwide policies, there is meaningful variation in practice among institutions. Construction contracts on USG campuses, which are frequent and substantial, follow USG procurement rules, not DOAS rules.

The third exception is the Georgia Technology Authority, GTA, which manages information technology procurement for state agencies. GTA has its own contract vehicles, its own preferred vendor programs, and its own solicitation processes for IT services and software. When a state agency needs IT services, the procurement often flows through a GTA framework contract rather than a standalone DOAS competition.

Beyond DOAS and its major exceptions, there is county and municipal procurement. Each of Georgia's one hundred fifty-nine counties, and each of its hundreds of incorporated municipalities, has the authority to conduct its own procurement. Some follow DOAS-like competitive procedures. Some have their own procurement codes. Some have relatively informal practices. A vendor contract with the City of Atlanta is governed by Atlanta's procurement code. A contract with Chatham County is governed by Chatham County's procurement rules. When advising clients at the county or municipal level, you must investigate the specific jurisdiction's rules before giving advice.

Let us now focus on the bid protest process for Georgia state contracts, because this is where practitioners most frequently need precise knowledge. Under DOAS procedures and O.C.G.A. Section 50-5-67, after a Georgia state agency issues a notice of intent to award a contract, a disappointed offeror has ten calendar days to file a formal bid protest with DOAS. This ten-day window begins when the notice of intent to award is issued. Unlike the federal system, where there are nuances about when the clock starts depending on whether there was a required debriefing, the Georgia process is relatively straightforward: notice of intent to award triggers ten calendar days. After ten days, the protest window has closed and any objection is waived.

A protest filed with DOAS goes to the State Purchasing Division. DOAS reviews the administrative record, may request additional information, and issues a written decision. If the protester receives an adverse decision from DOAS, it has the right to appeal to the Superior Court of Fulton County. The court reviews DOAS's decision under an administrative law standard — was the agency's decision arbitrary, capricious, or contrary to law? The appeal process is slower than the DOAS review, and by the time an appeal is decided, the contract may already be performing. This is why the DOAS protest, even though it lacks the automatic stay power of a GAO protest, is worth filing — it is the necessary predicate for judicial review if you need it.

One practical issue that trips up contractors in state and local procurement is Georgia's Open Records Act. The Open Records Act, at O.C.G.A. Section 50-18-70 and following, requires state and local government records to be made available to the public upon request, with specific enumerated exceptions. The most relevant exception for procurement purposes is the competitive bid exemption — which protects sealed bids and proposals from disclosure before opening or before the award decision. But after the award is made, the submitted proposals generally become public records subject to ORA requests unless specific exemptions apply. The trade secret exemption under O.C.G.A. Section 50-18-72(a)(1) can protect specific proprietary technical information, but only if it is properly designated as a trade secret at submission time and only if it meets the legal definition of a trade secret. The competitive bidding exemption under Section 50-18-72(a)(34) protects competitive sealed bids and proposals from disclosure while the process is ongoing, but does not protect the final submitted proposal after award.

The practical consequence for your clients: before submitting a proposal on a Georgia state procurement, advise them to identify and properly designate any truly proprietary information — pricing methodologies, cost structures, technical approaches, key personnel data — as trade secrets, with a clear written designation and factual support for why each item qualifies. If they do not make this designation at submission time, competitors can file an ORA request the day after award and obtain your client's complete proposal, including pricing data that competitors can use to undercut them in future procurements.

Let me close with GDOT and the federal flowdown issue, because it illustrates an important general principle. When Georgia receives federal money — federal highway funds, federal education funds, federal environmental grants — and passes that money through to a contractor via a state contract, the federal requirements often flow down to the state contract. GDOT highway construction contracts funded by the Federal Highway Administration must include Davis-Bacon prevailing wage requirements, must include federal civil rights and equal opportunity requirements, and must include DBE participation requirements. A contractor on a GDOT project funded by federal highway money cannot assume that Georgia state law is the only applicable framework. Federal requirements are embedded in the state contract, and violations of those federal requirements can create both state contract liability and federal enforcement exposure.

Your reflection question for this week: a contractor client has been doing federal DoD work for five years and wants to expand into Georgia state contracts. They are thinking about DOAS and GDOT opportunities. What are the three most important differences between federal contracting and Georgia state contracting that you would explain in your first meeting with them? What risks specific to the state system should they be aware of before pursuing their first state contract?

State and local procurement is underserved by the legal market relative to federal contracting, and that creates opportunity. An attorney who understands both the federal and Georgia state procurement systems, and who can advise clients operating in both, occupies a distinctive niche. See you tomorrow.`

  {
    id: 9,
    title: "Cybersecurity, Emerging Issues, and Staying Current",
    duration: "~19 min",
    script: `Good morning. This week we are covering two things: cybersecurity requirements in government contracting, which is one of the most rapidly evolving areas of GovCon law, and the discipline of staying current in a practice area that changes constantly. I am going to spend about two thirds of this lecture on the substance of cybersecurity requirements, and then close with something that I think is genuinely important for practitioners: how to build the information infrastructure that keeps you current without consuming your entire life.

Let us start with why cybersecurity has become central to government contracting. The federal government — and particularly the Department of Defense — depends on contractors and subcontractors to store, process, and transmit enormous volumes of sensitive information. Technical data on weapons systems. Research and development data. Personnel information. The data is dispersed across thousands of contractor networks, most of which have historically been subject to far less security oversight than government systems. This created an obvious vulnerability, which adversaries have exploited repeatedly. The government's response has been to impose increasingly specific and enforceable cybersecurity requirements as contract terms — creating a legal obligation on contractors to protect federal data on their own systems, and creating significant legal exposure when they fail to do so.

The first major regulatory development you need to know is DFARS 252.204-7012, titled Safeguarding Covered Defense Information and Cyber Incident Reporting. This clause applies to any DoD contract that involves the contractor accessing, storing, or transmitting Controlled Unclassified Information — data that is sensitive but not classified, such as certain technical specifications, export-controlled data, and personally identifiable information. DFARS 252.204-7012 requires the contractor to implement the security controls specified in NIST Special Publication 800-171, which contains 110 security requirements organized into 14 families — access control, audit and accountability, configuration management, identification and authentication, incident response, maintenance, media protection, personnel security, physical protection, risk assessment, security assessment, system and communications protection, system and information integrity, and awareness and training. The clause also requires contractors to report cyber incidents to the DoD within 72 hours of discovery. And critically, the clause flows down to all subcontractors who handle covered defense information — meaning a prime contractor who receives a DoD contract with this clause must flow it down to every subcontractor that touches the relevant data.

This flowdown requirement creates significant legal work. Prime contractors need to ensure their subcontract agreements include DFARS 252.204-7012. Subcontractors need to understand what it requires and whether they are in compliance. And when cyber incidents occur — and they do occur — the notification obligations, the documentation requirements, and the potential investigation and liability issues all require legal guidance.

Building on DFARS 252.204-7012, the Department of Defense has developed the Cybersecurity Maturity Model Certification program, called CMMC. CMMC is an attempt to create a more structured and verifiable system for contractor cybersecurity compliance, because self-certification under DFARS 252.204-7012 had proven inadequate — contractors were certifying compliance without actually being compliant. CMMC establishes three certification levels. Level 1 covers basic cyber hygiene, with fifteen foundational security practices, and requires annual self-assessment. Level 2 covers advanced cyber practices corresponding to the full 110 security requirements of NIST 800-171, and requires a triennial assessment by an accredited third-party assessment organization — a C3PAO — rather than self-assessment. Level 3 applies to the most sensitive work and requires government-led assessment against an enhanced set of requirements from NIST 800-172. CMMC requirements are being phased into DoD contracts through 2028, with Level 2 requirements applying to a growing percentage of contracts affecting Controlled Unclassified Information. For any attorney representing DoD contractors, understanding CMMC and its timeline is now essential.

The practical legal issues in CMMC practice are substantial. Contractors who are not yet certified face exclusion from competitions requiring CMMC. The certification process is expensive and time-consuming — achieving NIST 800-171 compliance for a Level 2 certification can cost a mid-sized defense contractor millions of dollars in IT upgrades and assessment fees. Small subcontractors, which are often the weakest link in the defense industrial base's cyber posture, face the greatest challenge. There are CMMC requirement flow-down issues in subcontract drafting. And there are False Claims Act implications when contractors falsely certify their cybersecurity compliance status in proposals and contract representations. Several major defense contractors have already faced FCA liability for cybersecurity certification fraud.

Let me also briefly address the Buy American and domestic preference framework, because it is currently in significant flux and affects a wide range of government contracts. The Buy American Act, Title 41 U.S.C. Sections 8301 through 8305, requires federal agencies to purchase domestic end products — products manufactured in the United States with domestic components — unless exceptions apply. FAR Part 25 implements these requirements. The Trade Agreements Act provides an exception for products from countries with which the United States has qualifying trade agreements, allowing those products to compete on equal footing with domestic products above the applicable threshold. Recent executive orders have significantly tightened Buy American requirements, raised domestic content thresholds, and added new reporting requirements. For contractors in construction, manufacturing, and technology supply, understanding current Buy American requirements is a compliance issue that must be addressed in every solicitation review.

Now let me spend the last portion of this lecture on something that is less substantive but equally important: staying current. Government contracting law changes constantly. The FAR and DFARS are amended through hundreds of rulemaking actions each year. The GAO issues thousands of bid protest decisions annually, and each one can contain important new precedent. The SBA issues OHA size protest decisions. The Court of Federal Claims and the Federal Circuit issue decisions that shape the legal landscape. DOJ announces FCA settlements that signal enforcement priorities. Congress passes authorization acts that change the rules. An attorney who stops learning the day they feel competent is an attorney who will be wrong more and more frequently over time.

The infrastructure for staying current does not need to be elaborate. A few targeted sources, checked regularly, will keep you meaningfully informed. The GAO publishes its bid protest decisions on its website, and you can sign up for email notifications. The Federal Register — regulations dot gov — has an email alert system that will notify you when proposed and final rules affecting the FAR, DFARS, and SBA regulations are published. Westlaw and Bloomberg Law have GovCon-specific alert services. The DOJ publishes press releases for every significant FCA settlement, and those are available by email subscription. A fifteen-minute Friday morning ritual of scanning these sources — looking for decisions and developments relevant to your active client matters and to the areas you are developing — is sufficient to stay meaningfully current.

Also important: reading actual decisions, not just summaries. It is easy to read a headline summarizing a GAO bid protest decision and think you understand the holding. But reading the actual decision is how you build the pattern recognition to advise clients correctly. GAO decisions are typically five to fifteen pages. They are readable. They walk through the facts, the agency's position, the protester's argument, and GAO's analysis. Reading ten or fifteen of them in an area — say, OCI protest grounds, or evaluation methodology challenges — gives you a practical command of how GAO thinks about the issue that no secondary source can replicate.

One more note: the most valuable things you know in GovCon practice will often come not from reading cases but from understanding how government agencies actually operate. Contracting officers are humans working under time pressure, budget pressure, and competing demands. Understanding what motivates a CO's decision-making, what constraints they operate under, what they fear — a protest, an IG audit, a GAO report — makes you dramatically more effective at advising clients about how to interact with the government. If you have the opportunity to attend any event where you can hear from active or retired contracting officers — CLE panels, industry association events, government-industry conferences — take it.

Your reflection question for this week: build your personal GovCon continuing education system right now. Open a browser and set up at least three of the following: GAO bid protest email notifications, Federal Register email alerts for FAR and DFARS rulemaking, DOJ FCA press release email alerts, and Google Alerts for false claims act settlement, Georgia DOAS procurement, and CMMC rule update. Write down the three news developments in GovCon that matter most to your target clients right now. That's your baseline.

See you tomorrow. Next week we pull everything together.`

  {
    id: 10,
    title: "Pulling It Together: From Knowing the Law to Practicing It",
    duration: "~21 min",
    script: `Good morning. Welcome to Week Ten. You have spent nine weeks building the foundational knowledge of government contracting law: the regulatory architecture, the pre-award process, small business programs, the doctrines that define government contracts, the claims and disputes framework, bid protest practice, the False Claims Act and ethics compliance, Georgia state and local procurement, and cybersecurity requirements. This week is about integration. It is about taking what you know and translating it into a functioning practice.

I want to start with an honest observation about the gap between knowing law and practicing it. Many attorneys know the relevant law in their area of practice. Far fewer know how to actually apply it efficiently in a client conversation, identify the issues that matter quickly, and translate legal analysis into business advice that clients can act on. That gap — between knowing and practicing — is closed by developing three specific skills: a systematic intake process, a disciplined contract reading methodology, and a clear sense of where your knowledge ends and where you need to learn more or associate with someone who knows more. Let me walk through each of these.

The intake process is your first point of contact with a client matter. In GovCon practice, the stakes of getting the intake right are especially high because of the compressed deadlines we have discussed throughout this course. A bid protest window of ten days. A board of contract appeals appeal window of ninety days. A Georgia DOAS protest window of ten calendar days. Any of these can expire while a client is shopping for an attorney, waiting to hear back from you, or simply not understanding that time is running. Your intake process needs to surface these deadlines immediately — within the first five minutes of any conversation about a GovCon matter. The questions are: what type of matter is this? Is there a decision we are reacting to — an award, a COFD, a notice of intent to award, a termination letter? When did you receive it? What day is today? Count the days. Identify the hard deadlines. Only after you have assessed whether there is an imminent deadline should you begin the broader assessment of the merits.

The broader intake should also answer: is this a federal contract or a state contract? Which agency? What dollar value? What type of contract — fixed price, cost reimbursement, IDIQ? Is the contractor a small business, and if so, which socioeconomic programs apply? These background facts shape everything else. A construction contract with GDOT is governed by entirely different law than a professional services contract with the Department of Defense. Getting the basic facts right before you begin analysis is essential.

The contract reading methodology is the second skill. When a client gives you a government contract to review, you cannot read it the same way you would read a commercial contract. Commercial contracts are largely self-contained. Government contracts are not. A government contract document is the tip of an iceberg. The visible contract contains specific terms and conditions, the statement of work, and explicitly incorporated clauses. But it also incorporates by reference hundreds of pages of FAR and DFARS clauses — you need to pull these up and read them. And under the Christian Doctrine, mandatory regulatory clauses may be implied into the contract even if they are not listed anywhere. Your contract review needs to: identify the contract type and applicable FAR parts; pull and read the incorporated clauses, especially the Changes clause, the Termination clauses, the Disputes clause, and any relevant cybersecurity clauses; assess the Statement of Work for ambiguities; identify any unusual or potentially unenforceable terms; and flag the areas of highest legal risk for the client.

In the first two years of practice, you will need to look up most of this in real time. With experience, you develop the ability to read a contract document and immediately recognize the legal issues without searching. That recognition is not a talent — it is pattern recognition built by reading hundreds of contracts and seeing the same issues recur.

The third skill is self-awareness about the limits of your knowledge. Government contracting law is wide. Nobody knows all of it deeply. A practitioner who focuses on bid protests may know GAO procedure cold but may not have done a cost accounting claim in years. A practitioner who focuses on small business certification may not have handled a False Claims Act investigation. Early in your practice, when a matter falls outside the area you know well, the right answer is to say so — to the client and to yourself. Associating with an experienced GovCon attorney on matters that require knowledge you do not yet have is not a sign of weakness. It is how you learn, how you build the network that will serve your practice for decades, and how you avoid malpractice exposure from attempting to advise on things you do not understand.

Let me talk about the business development dimension of a GovCon practice, because the law is only part of what you need to succeed. Government contracting is an industry, not just a legal category. The people who buy and sell government contracts — contracting officers, procurement attorneys, program managers, lobbyists, business development professionals, and executives at prime contractors — are an ecosystem. Getting inside that ecosystem is essential for building a practice. The Georgia Bar has relevant sections. The National Contract Management Association has a Georgia chapter. The Armed Forces Communications and Electronics Association has a Georgia chapter. Defense industry associations organize events around the major Georgia military installations. Local chambers of commerce have government contracting subgroups. Showing up at these events, listening more than you talk, and demonstrating that you understand the world these people live in — not just the law that governs it — is how you build the relationships that generate referrals and clients.

I want to walk through three hypothetical scenarios to illustrate how integrated knowledge looks in practice. These are the kinds of problems your clients will bring to you.

First scenario: a small business Eight-A contractor in Atlanta calls you Monday morning. They received a notice of intent to award on a contract they bid on, but the award went to a competitor. It is day eight after the notice. They believe their proposal was evaluated improperly and that the winning offeror has an undisclosed OCI because it previously provided advisory services to the agency in connection with the same program. What do you do? The first thing you do is recognize that you have two calendar days before the DOAS protest deadline — wait, this is a federal contract, so you are working with the GAO ten-day window. Same urgency. You need to understand what forum is correct based on whether this is a federal or state contract. You need to review the solicitation and the debriefing materials if available. You need to assess the OCI theory: did the competitor actually do advisory work for the agency, and was that work related to the requirements for this contract? If the facts support the OCI theory, you file the protest immediately. You do not wait for the full factual picture. You file a protest that preserves your client's rights and supplemental grounds as more information becomes available. The automatic stay preserves the client's position while you build the record.

Second scenario: a defense contractor client sends you a letter from the Army Contracting Command. The letter is a Contracting Officer's Final Decision denying a two point four million dollar equitable adjustment claim. The client receives this letter on October 1st. What do you tell them? First: you have ninety days to appeal to the ASBCA, meaning you must file by December 30th. You have twelve months to file at the Court of Federal Claims, meaning you must file by September 30th of next year. Second: read the COFD carefully. Is the CO's legal theory correct? What are the factual bases for the denial? Is there information the CO did not consider? Third: what is the client's risk tolerance? What is the litigation budget? Is the claim strong enough on the merits to justify the cost of appeal? Fourth: assuming you are going to appeal, which forum is better — the ASBCA, where the judges know government contracts cold and the proceedings are faster and cheaper, or the COFC, where you have more formal discovery and a potentially more favorable legal standard? Make that recommendation thoughtfully and document your reasoning.

Third scenario: a new client — a mid-sized IT services firm — wants a general GovCon compliance review. They have three active DoD contracts, two DOAS contracts, and are actively pursuing new federal business. What does your review cover? You start with the federal contracts. Pull the DFARS clauses — is DFARS 252.204-7012 in any of these contracts? If so, is the company compliant with NIST 800-171? Do they have CMMC certification or a plan of action to achieve it? Is the mandatory disclosure obligation in FAR 52.203-13 triggered? Does the company have an ethics compliance program that meets the FAR requirements? Then the DOAS contracts: are there any Open Records Act confidentiality designations that need to be renewed? Are protest deadline windows understood for any procurement the company intends to pursue? Is the company properly registered on the Georgia Procurement Registry? Finally, the new business pipeline: what certifications does the company have? What NAICS codes are they registered under? Are size standards at risk? Is there any affiliation concern?

That review is a substantial engagement with real commercial value to the client. An attorney who can do it competently is providing something that most general practice attorneys cannot.

Your reflection question for this week — and for the entire ten-week program — is this: go back to the prediction you made in Week One, Day Five. You listed the five FAR parts you expected to use most in practice. How does that list compare to what you have learned? What parts did you predict correctly, and what did you miss? More importantly: what is the single area of government contracting law where you feel most confident now, and what is the single area where you feel you still need the most work? Write both down. The area where you feel most confident is the foundation you build on. The area where you still need work is your reading list for the next ninety days.

Ten weeks. Fifty sessions. Thirty minutes a day of deliberate, structured learning. You now have a foundation that most general practice attorneys in Georgia do not have. The work ahead is practice — actual client matters, real contracts, real disputes, real people with real business problems who need a lawyer who understands the world they operate in. Go do it. See you in the practice.`

function TTSPlayer({ lecture }) {
  const [playing, setPlaying] = React.useState(false);
  const [speed, setSpeed] = React.useState(1.0);
  const [wordIndex, setWordIndex] = React.useState(0);
  const utterRef = React.useRef(null);
  const wordsRef = React.useRef([]);

  const words = React.useMemo(() => lecture.script.split(/\s+/).filter(Boolean), [lecture.script]);
  const totalWords = words.length;
  const minutesLeft = Math.ceil((totalWords - wordIndex) / (150 * speed));
  const pct = totalWords > 0 ? Math.round(wordIndex / totalWords * 100) : 0;

  const stop = React.useCallback(() => {
    window.speechSynthesis.cancel();
    setPlaying(false);
    setWordIndex(0);
  }, []);

  const pause = React.useCallback(() => {
    window.speechSynthesis.pause();
    setPlaying(false);
  }, []);

  const speak = React.useCallback((fromWord) => {
    window.speechSynthesis.cancel();
    const remaining = words.slice(fromWord).join(' ');
    const chunks = [];
    const sentences = remaining.match(/[^.!?]+[.!?]+/g) || [remaining];
    let current = '';
    sentences.forEach(s => {
      if ((current + s).length > 200) {
        if (current) chunks.push(current.trim());
        current = s;
      } else {
        current += s;
      }
    });
    if (current.trim()) chunks.push(current.trim());

    let chunkWordOffset = fromWord;
    chunks.forEach((chunk, i) => {
      const u = new SpeechSynthesisUtterance(chunk);
      u.rate = speed;
      u.lang = 'en-US';
      const chunkWords = chunk.split(/\s+/).filter(Boolean).length;
      const capturedOffset = chunkWordOffset;
      chunkWordOffset += chunkWords;
      u.onstart = () => setWordIndex(capturedOffset);
      u.onend = () => {
        if (i === chunks.length - 1) { setPlaying(false); setWordIndex(0); }
      };
      window.speechSynthesis.speak(u);
    });
    setPlaying(true);
  }, [words, speed]);

  const resume = React.useCallback(() => {
    if (window.speechSynthesis.paused) {
      window.speechSynthesis.resume();
      setPlaying(true);
    } else {
      speak(wordIndex);
    }
  }, [speak, wordIndex]);

  React.useEffect(() => { return () => window.speechSynthesis.cancel(); }, []);

  React.useEffect(() => {
    if (playing) { window.speechSynthesis.cancel(); speak(wordIndex); }
  }, [speed]);

  const speeds = [0.8, 1.0, 1.2, 1.5, 1.8];

  return (
    <div style={{background:'var(--navy)',borderRadius:10,padding:'18px 20px',marginBottom:18}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
        <div>
          <div style={{color:'var(--gold)',fontSize:11,fontWeight:700,letterSpacing:'0.6px',textTransform:'uppercase',marginBottom:3}}>🎧 AUDIO LECTURE — WEEK {lecture.id}</div>
          <div style={{color:'white',fontSize:15,fontWeight:700,marginBottom:2}}>{lecture.title}</div>
          <div style={{color:'rgba(255,255,255,0.6)',fontSize:12}}>{lecture.duration} · {totalWords.toLocaleString()} words · {playing ? `~${minutesLeft} min left` : 'Press play to start'}</div>
        </div>
      </div>

      <div style={{background:'rgba(255,255,255,0.1)',borderRadius:6,height:6,marginBottom:14}}>
        <div style={{background:'var(--gold)',borderRadius:6,height:6,width:`${pct}%`,transition:'width 0.5s'}} />
      </div>

      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        {!playing ? (
          <button onClick={() => resume()}
            style={{background:'var(--gold)',color:'var(--navy)',border:'none',borderRadius:6,padding:'9px 20px',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
            ▶ {wordIndex > 0 ? 'Resume' : 'Play Lecture'}
          </button>
        ) : (
          <button onClick={pause}
            style={{background:'var(--gold)',color:'var(--navy)',border:'none',borderRadius:6,padding:'9px 20px',fontWeight:700,fontSize:13,cursor:'pointer'}}>
            ⏸ Pause
          </button>
        )}
        <button onClick={stop}
          style={{background:'rgba(255,255,255,0.12)',color:'white',border:'none',borderRadius:6,padding:'9px 16px',fontWeight:600,fontSize:12,cursor:'pointer'}}>
          ⏹ Stop
        </button>
        <div style={{display:'flex',gap:4,marginLeft:4}}>
          {speeds.map(s => (
            <button key={s} onClick={() => setSpeed(s)}
              style={{background: speed===s ? 'var(--gold)' : 'rgba(255,255,255,0.12)', color: speed===s ? 'var(--navy)' : 'white',
                border:'none',borderRadius:4,padding:'5px 8px',fontSize:11,fontWeight:700,cursor:'pointer'}}>
              {s}x
            </button>
          ))}
        </div>
        <div style={{marginLeft:'auto',color:'rgba(255,255,255,0.5)',fontSize:11}}>{pct}% complete</div>
      </div>
      <div style={{marginTop:10,color:'rgba(255,255,255,0.45)',fontSize:11}}>
        💡 Works best in Chrome or Edge. Listen during your commute, walk, or workout — then use the 30-min reading plan below for hands-on practice.
      </div>
    </div>
  );
}

As a licensed Georgia attorney, you are entering this practice at an advantageous moment and in an advantageous location. Georgia's federal footprint is enormous and concentrated in ways that create sustained legal demand. Robins Air Force Base in Warner Robins is one of the largest Air Logistics Complexes in the world — it employs more than 25,000 military and civilian personnel and supports hundreds of contractors. Fort Eisenhower in Augusta (formerly Fort Gordon) is the home of Army Cyber Command and the Signal Corps, anchoring a growing cybersecurity and IT contracting corridor. Hunter Army Airfield in Savannah supports the 3rd Infantry Division's aviation assets. Naval Submarine Base Kings Bay in Camden County houses the Atlantic ballistic missile submarine fleet and its substantial maintenance and supply chain. The Port of Savannah — the largest single container terminal in the Western Hemisphere — moves military cargo and generates its own contracting ecosystem. Beyond the military installations, Atlanta is home to the CDC, the Federal Reserve Bank of Atlanta, the Department of Homeland Security's CISA regional presence, and dozens of major federal agencies with substantial contracting budgets.

The lifecycle begins with requirements development. A government agency identifies a need and translates it into a written statement of work (SOW), performance work statement (PWS), or statement of objectives (SOO). This stage is largely internal to the government, but it matters to practitioners because defects in the requirements document — vague performance standards, ambiguous deliverables, impossible timelines — become weapons in later disputes. The government is generally held to a standard of reasonable clarity in its requirements, and when it fails that standard, contractors may have grounds for an equitable adjustment.

    content: `If bid protests represent the pre-award side of GovCon practice, contract disputes represent the performance side — and for many practitioners, disputes work is where the bulk of fees are earned. Understanding the changes and claims framework is non-negotiable.

The constructive change doctrine fills the space where the government changes the contract without issuing a formal change order. A constructive change occurs when a government agent's actions, directions, or failures effectively require the contractor to perform work beyond the contract's scope, and those actions are not accompanied by the formal change order that would trigger a price adjustment. Common examples: a COR who verbally directs the contractor to use a more expensive material than the spec requires; an inspector who rejects conforming work based on a standard not in the contract; a CO who delays providing government-furnished equipment, forcing the contractor to stand down or resequence work; a design defect in government-provided specifications that causes the contractor to perform extra work to fix. In each case, the contractor did extra work at government direction but received no formal change order — so the extra cost sits on the contractor's books unrecovered.

    content: `Bid protests are among the most time-pressured and intellectually demanding work in GovCon practice — and one of the most rewarding when you win. A sustained protest can reverse an award worth hundreds of millions of dollars. Understanding the forum, the process, and the grounds is essential.

A bid protest is a challenge to a government agency's procurement decision — most commonly the decision to award a contract to one bidder over another, but also decisions about the terms of a solicitation (pre-award protests) or an agency's decision about how to conduct a procurement. The three forums for federal bid protests are: (1) Agency-level, filed directly with the contracting agency; (2) the Government Accountability Office (GAO); and (3) the Court of Federal Claims (COFC).

Agency-level protests are cheap and informal but weak: the agency is essentially reviewing its own decision, and sustain rates are low. Their primary value is in systems where the agency has a well-designed protest review process (DoD has Agency-Level Protest procedures under DFARS that can be useful) or when the grounds are very clear-cut. Agency protests do not stop performance — the contractor can proceed with the work while the protest is pending.

The GAO (Government Accountability Office), operating through its Procurement Law Division, is the dominant bid protest forum. GAO has jurisdiction over protests of solicitations and awards by federal executive agencies. The process is designed to be relatively fast and affordable compared to federal court: GAO must issue its decision within 100 calendar days of filing (65 days in the "express option" for appropriate cases). The most powerful feature of a timely-filed GAO protest is the automatic stay: if the protest is filed within 10 calendar days after contract award (or 5 days after a required debriefing), the agency is legally required to suspend performance of the new award until GAO decides the protest. This is a significant lever — the winning contractor cannot begin work, the agency cannot make progress on its requirements, and all parties have strong incentives to take the protest seriously.

The GAO process begins with the protest filing, which must identify the grounds with reasonable specificity. The agency then files an Agency Report (AR) — a written defense of the procurement, typically including the entire evaluation record — within 30 days. The protester then files Comments on the AR within 10 days, often supplementing protest grounds based on what the AR reveals. GAO issues its decision after reviewing the record; oral arguments are rare. If GAO sustains the protest, it issues recommendations (not binding orders) to the agency — reopen discussions, reevaluate proposals, resolicit — which agencies follow in the vast majority of cases.

Standing to protest at GAO requires being an "interested party" — a current or prospective offeror whose direct economic interest would be affected by the award or failure to award. A protester who was not in line for the award (because another firm would have won even if the flawed award were corrected) lacks standing. This is a threshold question to analyze carefully before filing.

What grounds win? Evaluation errors — the government failed to follow its stated evaluation criteria, applied criteria differently to different offerors, or made mathematical errors — are the most common successful grounds. Unequal treatment — the government gave one offeror information or opportunities not given to others, or applied standards inconsistently — is highly fact-specific but winnable. Organizational Conflict of Interest (OCI) — the winning contractor had an unfair advantage due to its prior work for the agency in a related role, or has competing business interests that bias its performance — is a specialized but important ground. Solicitation ambiguity challenges — the RFP's evaluation criteria were inconsistent, the scope was unclear — are most powerful as pre-award protests filed before proposal due date. Late proposal submissions and responsiveness failures are bright-line rules that can determine outcomes. What rarely wins: challenges to the government's business judgment about technical merit (GAO gives agencies significant discretion in technical evaluation), price reasonableness determinations, and general complaints about the acquisition strategy.

The Court of Federal Claims (COFC) is the alternative federal court forum. It has de novo review authority (it can look at facts fresh, not just administrative record), which makes it more powerful than GAO in theory, but the process is slower and more expensive. The COFC is the preferred forum for very large procurements, cases involving classified information, cases where the factual record is disputed, or cases where a contractor has been shut out of the GAO process. Unlike GAO, the COFC can issue injunctions (not mere recommendations), and those are fully binding. The COFC also hears protests after GAO has ruled — a protester can go to COFC even after losing at GAO, though the standard of review changes.

For the attorney, the immediate post-award period is the most critical window. When a client calls after a disappointing award, the first question is: when did you receive notice of the award? Count to ten calendar days. If that clock has not expired, you may still be able to file at GAO with an automatic stay. If it has expired, automatic stay is gone, but a protest may still be worth pursuing — particularly if the agency has not yet begun contract performance.

One dynamic to understand on the defense side: automatic stay creates opportunities for gamesmanship. A cash-poor competitor who loses a procurement may file a protest primarily to trigger the 100-day freeze on contract performance — not because it genuinely believes its protest will succeed, but to deny the winner cash flow and potentially force the agency to re-solicit. When you represent the awardee, a timely-filed protest by a competitor means contract performance is frozen. The agency can seek to override the stay (showing urgent and compelling need), but that is the exception. Advise winning contractor clients early that the stay is a real risk even on a strong award, and help them plan for the possibility that work will not begin on day one. If the protest is clearly frivolous, document that position — it may support a claim for costs and fees if GAO finds the protest was filed for delay rather than on the merits.`,

    content: `The GovCon compliance landscape is dense and the stakes are uniquely high: violation of federal contracting rules can trigger not just contract termination but civil penalties at $28,000+ per false claim, treble damages, criminal prosecution, and debarment from all future federal contracting. Understanding the key compliance frameworks is as important for GovCon attorneys as contract performance law — because your clients are living under all of it simultaneously.

The False Claims Act (31 U.S.C. §§ 3729-3733) is the most powerful enforcement tool in federal contracting. The FCA imposes liability on any person who knowingly presents or causes to be presented a false or fraudulent claim for payment to the federal government. "Knowingly" under the FCA does not require specific intent to defraud — it covers actual knowledge, deliberate ignorance, or reckless disregard of the truth or falsity of the claim. In contracting terms, the most common FCA violations are: submitting invoices for work not performed; certifying compliance with contract requirements (small business status, cybersecurity standards, Buy American Act compliance, drug-free workplace, etc.) when the certification is false; double-billing; billing at rates higher than the contract allows; and overbilling on time-and-materials contracts.

            </div>
          </div>
        )}

    </div>

        notes: 'Attorney Watch: The prime\'s right to terminate for convenience flows from the government\'s right to terminate the prime — if the government terminates the prime, the prime must terminate the sub. The sub\'s termination settlement rights can be significant: subcontractors who understand FAR Part 49 settlement principles can recover substantial costs including startup costs, committed materials, and reasonable profit. Counsel sub clients to document all costs from contract inception in case of a convenience termination.',

        notes: 'Attorney Watch: Cybersecurity compliance is the fastest-growing source of subcontract risk in the defense space. A prime who flows down DFARS 252.204-7012 to a sub that is not actually compliant faces both prime contract violation exposure and, potentially, FCA liability if the sub has made false compliance certifications. Counsel prime clients to take sub cybersecurity compliance seriously — a due diligence checklist and contractual compliance representations from subs are minimum steps. For small subs, CMMC compliance costs can be significant — factor this into subcontract pricing negotiations.',

    source: null,
    sourceLabel: null,
    summary: 'Government contracting NDAs require special provisions not found in commercial NDAs. Source-selection-sensitive information (SSSI) obtained through government channels has federal law restrictions (41 U.S.C. § 2102) that override any private agreement. Teaming-context NDAs must also account for the competitive nature of the procurement — the receiving party may be simultaneously working on competing proposals.',

        notes: 'Attorney Watch: In a GovCon context, the "public domain" exclusion requires care — a contractor\'s proposed technical approach may not be public, but if the contractor presented it at an industry day, does that make it public? Define "public domain" carefully. Also: if a party receives source selection information from a government official (even inadvertently), a private NDA cannot authorize retention or use of that information — federal law controls.',

        notes: 'Attorney Watch: Purpose limitation is the most important substantive provision in a GovCon NDA. Without it, a consultant or potential sub who receives your client\'s pricing model is free to use it for other bids. Draft the purpose limitation specifically: "solely in connection with the pursuit and performance of [specific solicitation/contract number]." Include a non-use clause that survives any termination of the business relationship for at least 3-5 years.',
      },

        title: '3. GovCon-Specific Prohibitions',

        notes: 'Attorney Watch: The prohibition on simultaneous support of competing teams is the key GovCon-specific term that doesn\'t appear in commercial NDAs. Without it, a consultant could theoretically work for two competing bidders at once — legally, unless the NDA or engagement agreement prohibits it. Counsel clients to include an explicit conflict representation and prohibition in any engagement with consultants or potential teaming partners.',

        notes: 'Attorney Watch: "Including electronic copies" must be explicit — many parties interpret return/destroy obligations to cover only paper documents. For proposals that include technical data or cost models in spreadsheet or software format, the electronic copy obligation is equally important. The "or certify destruction" alternative is practical for large document sets but requires a credible written certification.',

        notes: 'Attorney Watch: Injunctive relief for NDA breaches is standard but courts still require proof of irreparable harm. The more specific the identification of the competitive harm (e.g., "disclosure would allow a competing bidder to undercut our proposal pricing"), the stronger the case for injunctive relief. Include an attorneys\' fees provision for the prevailing party in any NDA enforcement action.',
      },

  },

              <div style={{fontSize:40,marginBottom:12}}>📖</div>
              <div style={{fontSize:16,fontWeight:700,color:'var(--navy)',marginBottom:8}}>Full FAR Text — Offline</div>
              <div style={{fontSize:13,maxWidth:320,lineHeight:1.6}}>Search by keyword or section number above, or click a Part in Quick Access to start reading. All 53 parts are available locally — no internet required.</div>
              <div style={{marginTop:20,padding:'12px 16px',background:'#f0f4ff',borderRadius:6,fontSize:12,color:'#3b5fc0',maxWidth:360}}>
                💡 Tip: Search "19.502" to jump straight to a section, or "HUBZone" to find all relevant provisions across the FAR.
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [activeModule, setActiveModule] = useState(1);
  const [checked, setChecked] = useLocalStorage('checked', {});
  const [notes, setNotes] = useLocalStorage('notes', {});
  const [quizStates, setQuizStates] = useLocalStorage('quizStates', {});

  const totalItems = ALL_CHECKLIST_ITEMS.length;
  const doneItems = ALL_CHECKLIST_ITEMS.filter(i => checked[i.id]).length;
  const pct = totalItems > 0 ? Math.round(doneItems/totalItems*100) : 0;

  const handleToggle = useCallback((id) => {
    setChecked(prev => ({...prev, [id]: !prev[id]}));
  }, []);

  const handleNote = useCallback((id, val) => {
    setNotes(prev => ({...prev, [id]: val}));
  }, []);

  const getQuizState = (modId) => quizStates[modId] || { answers: {}, submitted: false };

  const handleQuizAnswer = (modId) => (qi, val) => {
    if (val === 'submit') {
      setQuizStates(prev => ({...prev, [modId]: {...(prev[modId] || {answers:{}}), submitted: true}}));
    } else {
      setQuizStates(prev => ({
        ...prev,
        [modId]: {
          ...(prev[modId] || {answers:{}, submitted:false}),
          answers: {...((prev[modId] || {}).answers || {}), [qi]: val}
        }
      }));
    }
  };

  const handleQuizReset = (modId) => () => {
    setQuizStates(prev => ({...prev, [modId]: {answers:{}, submitted:false}}));
  };

  const moduleProgress = (modId) => {
    const items = CHECKLISTS[modId] || [];
    if (!items.length) return null;
    const done = items.filter(i => checked[i.id]).length;
    return `${done}/${items.length}`;
  };

  const renderModule = () => {
    switch(activeModule) {
      case 1: return <Module1 quizState={getQuizState(1)} onAnswer={handleQuizAnswer(1)} onReset={handleQuizReset(1)} />;
      case 2: return <Module2 checked={checked} onToggle={handleToggle} notes={notes} onNote={handleNote} />;
      case 3: return <Module3 checked={checked} onToggle={handleToggle} notes={notes} onNote={handleNote} />;
      case 4: return <Module4 checked={checked} onToggle={handleToggle} notes={notes} onNote={handleNote} quizState={getQuizState(4)} onAnswer={handleQuizAnswer(4)} onReset={handleQuizReset(4)} />;
      case 5: return <Module5 checked={checked} onToggle={handleToggle} notes={notes} onNote={handleNote} />;
      case 6: return <Module6 checked={checked} onToggle={handleToggle} notes={notes} onNote={handleNote} />;
      case 7: return <Module7 checked={checked} onToggle={handleToggle} notes={notes} onNote={handleNote} />;
      case 8: return <Module8 checked={checked} onToggle={handleToggle} notes={notes} onNote={handleNote} allItems={ALL_CHECKLIST_ITEMS} />;
      case 9: return <Module9 />;
      case 10: return <Module10 />;
      case 11: return <Module11 />;
      case 12: return <Module12 />;
      case 13: return <Module13 />;
      case 14: return <Module14 />;
      case 15: return <Module15 />;
      default: return null;
    }
  };

  return (
    <div id="root-inner">
      <div className="disclaimer">
        <strong>Educational Tool Only — Not Legal or Financial Advice.</strong> Verify all rules, deadlines, and entity requirements directly with the <strong>State Bar of Georgia</strong>, the <strong>SBA</strong>, the <strong>GAO</strong>, and other relevant authorities before acting. Content reflects general practitioner knowledge; rules change.
      </div>
      <div className="app-shell">
        <aside className="sidebar">
          <div className="sidebar-header">
            <h1>GA GovCon Law Firm Launchpad</h1>
            <p>For licensed Georgia attorneys</p>
          </div>
          <div className="sidebar-progress">
            <div className="sidebar-progress-label">
              <span>Overall Progress</span>
              <span style={{color:'var(--gold)',fontWeight:700}}>{pct}%</span>
            </div>
            <div className="progress-bar-outer">
              <div className="progress-bar-inner" style={{width:`${pct}%`}} />
            </div>
          </div>
          <nav className="sidebar-nav">
            {MODULES.map(m => (
              <div
                key={m.id}
                className={`nav-item${activeModule === m.id ? ' active' : ''}`}
                onClick={() => setActiveModule(m.id)}
              >
                <div className="nav-item-num">{m.id}</div>
                <span>{m.label}</span>
                {moduleProgress(m.id) && (
                  <span className="nav-item-check">{moduleProgress(m.id)}</span>
                )}
              </div>
            ))}
          </nav>
        </aside>
        <main className="main-content">
          {renderModule()}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(e => console.log('SW registration failed:', e));
  });
}
</script>
</body>
</html>
