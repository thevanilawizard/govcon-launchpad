<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744;
  --navy-light:#243356;
  --charcoal:#2d3748;
  --gold:#c9a84c;
  --gold-light:#e8c96a;
  --bg:#f4f5f7;
  --white:#ffffff;
  --text:#1a202c;
  --text-muted:#5a6a7e;
  --border:#dde1e9;
  --success:#2d7a4f;
  --success-bg:#edf7f1;
  --danger:#c0392b;
  --danger-bg:#fdf0ef;
  --warning:#b7791f;
  --warning-bg:#fffbeb;
  --sidebar-w:260px;
  --radius:8px;
  --shadow:0 2px 8px rgba(0,0,0,0.08);
  --shadow-md:0 4px 16px rgba(0,0,0,0.12);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
#root{display:flex;flex-direction:column;min-height:100vh}

/* DISCLAIMER BANNER */
.disclaimer{background:#fef3c7;border-bottom:2px solid #d97706;padding:8px 20px;font-size:12px;color:#78350f;text-align:center;position:sticky;top:0;z-index:100}
.disclaimer strong{color:#92400e}

/* LAYOUT */
.app-shell{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--navy);color:#fff;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;position:sticky;top:37px;height:calc(100vh - 37px)}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-header h1{font-size:15px;font-weight:700;color:var(--gold);line-height:1.3;letter-spacing:0.3px}
.sidebar-header p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px}
.sidebar-progress{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-progress-label{font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar-outer{background:rgba(255,255,255,0.15);border-radius:4px;height:6px;overflow:hidden}
.progress-bar-inner{background:var(--gold);height:100%;border-radius:4px;transition:width 0.4s ease}
.sidebar-nav{flex:1;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:background 0.15s;border-left:3px solid transparent;font-size:13px;color:rgba(255,255,255,0.75)}
.nav-item:hover{background:rgba(255,255,255,0.07);color:#fff}
.nav-item.active{background:rgba(201,168,76,0.15);border-left-color:var(--gold);color:var(--gold)}
.nav-item-num{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.1);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600}
.nav-item.active .nav-item-num{background:var(--gold);color:var(--navy)}
.nav-item-check{margin-left:auto;font-size:11px;opacity:0.6}

/* MAIN CONTENT */
.main-content{flex:1;overflow-y:auto;padding:32px 36px;max-width:900px}
@media(max-width:768px){
  .app-shell{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;top:0}
  .main-content{padding:20px 16px}
}

/* MODULE HEADER */
.module-header{margin-bottom:28px}
.module-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:var(--navy);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.5px;margin-bottom:10px}
.module-header h2{font-size:24px;font-weight:700;color:var(--navy);line-height:1.2}
.module-header p{color:var(--text-muted);margin-top:6px;font-size:14px;max-width:680px}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.card h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3 .card-icon{font-size:16px}
.card p{color:var(--charcoal);font-size:14px;margin-bottom:10px;line-height:1.7}
.card p:last-child{margin-bottom:0}
.card ul,.card ol{padding-left:20px;color:var(--charcoal);font-size:14px}
.card li{margin-bottom:6px;line-height:1.6}

/* SECTION DIVIDER */
.section-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* CHECKLIST */
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:6px;border:1px solid var(--border);margin-bottom:8px;background:var(--white);transition:background 0.15s}
.checklist-item.checked{background:#f0fdf4;border-color:#86efac}
.checklist-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--success);cursor:pointer;flex-shrink:0;margin-top:2px}
.checklist-label{flex:1}
.checklist-label strong{font-size:13px;color:var(--text);display:block;font-weight:600}
.checklist-label span{font-size:12px;color:var(--text-muted);display:block;margin-top:2px}
.checklist-note-btn{font-size:11px;color:var(--gold);background:none;border:none;cursor:pointer;padding:2px 0;text-decoration:underline}
.checklist-note-input{width:100%;margin-top:6px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-size:12px;resize:vertical;min-height:44px;font-family:inherit}

/* QUIZ */
.quiz-card{background:linear-gradient(135deg,#f8f9ff 0%,#fff 100%);border:1px solid #c8d0e8;border-radius:var(--radius);padding:24px;margin-bottom:20px}
.quiz-card h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px}
.quiz-q{margin-bottom:20px}
.quiz-q p{font-size:14px;font-weight:600;color:var(--charcoal);margin-bottom:10px}
.quiz-option{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;margin-bottom:6px;font-size:13px;transition:all 0.15s;background:var(--white)}
.quiz-option:hover{border-color:var(--navy);background:#f7f9ff}
.quiz-option.correct{border-color:var(--success);background:var(--success-bg);color:var(--success)}
.quiz-option.incorrect{border-color:var(--danger);background:var(--danger-bg);color:var(--danger)}
.quiz-option.reveal-correct{border-color:var(--success);background:var(--success-bg)}
.quiz-feedback{font-size:12px;margin-top:6px;padding:8px 12px;border-radius:4px;line-height:1.5}
.quiz-feedback.correct{background:var(--success-bg);color:var(--success)}
.quiz-feedback.incorrect{background:var(--danger-bg);color:var(--danger)}
.quiz-btn{background:var(--navy);color:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px}
.quiz-btn:hover{background:var(--navy-light)}
.quiz-score{font-size:14px;font-weight:700;color:var(--navy);margin-top:14px;padding:12px;background:#f0f4ff;border-radius:6px;text-align:center}

/* SOURCE LIST */
.source-item{display:flex;gap-12px;padding:12px 16px;border-left:3px solid var(--gold);background:var(--white);border-radius:0 6px 6px 0;margin-bottom:10px;box-shadow:var(--shadow)}
.source-item .s-title{font-size:13px;font-weight:700;color:var(--navy)}
.source-item .s-desc{font-size:12px;color:var(--text-muted);margin-top:3px}
.source-item .s-where{font-size:11px;color:var(--gold);font-weight:600;margin-top:4px}

/* ALERT BOXES */
.alert{padding:14px 16px;border-radius:6px;font-size:13px;margin-bottom:14px;line-height:1.6}
.alert-info{background:#eff6ff;border-left:4px solid #3b82f6;color:#1e40af}
.alert-warning{background:var(--warning-bg);border-left:4px solid var(--warning);color:var(--warning)}
.alert-success{background:var(--success-bg);border-left:4px solid var(--success);color:var(--success)}

/* LANE PICKER */
.lane-picker{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.lane-q{margin-bottom:20px}
.lane-q label{display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px}
.lane-q select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;background:var(--white);color:var(--text)}
.lane-result{background:linear-gradient(135deg,#1a2744,#243356);color:#fff;border-radius:var(--radius);padding:24px;margin-top:16px}
.lane-result h4{color:var(--gold);font-size:16px;margin-bottom:10px}
.lane-result p{font-size:13px;color:rgba(255,255,255,0.85);margin-bottom:8px;line-height:1.7}
.lane-result ul{padding-left:18px;font-size:13px;color:rgba(255,255,255,0.8)}
.lane-result li{margin-bottom:5px}

/* COMPARISON TABLE */
.comp-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
.comp-table th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:0.4px}
.comp-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.comp-table tr:nth-child(even) td{background:#f9fafb}
.comp-table tr:hover td{background:#f0f4ff}
.badge-low{background:#dcfce7;color:#166534;padding:2px 7px;border-radius:10px;font-weight:700;font-size:11px}
.badge-med{background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:10px;font-weight:700;font-size:11px}
.badge-high{background:#fee2e2;color:#991b1b;padding:2px 7px;border-radius:10px;font-weight:700;font-size:11px}
.badge-star{background:#ede9fe;color:#5b21b6;padding:2px 7px;border-radius:10px;font-weight:700;font-size:11px}

/* MASTER DASHBOARD */
.master-progress{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;border-radius:var(--radius);padding:28px;margin-bottom:24px;text-align:center}
.master-progress .big-num{font-size:56px;font-weight:800;color:var(--gold);line-height:1}
.master-progress p{font-size:14px;color:rgba(255,255,255,0.7);margin-top:8px}
.master-progress-bar{background:rgba(255,255,255,0.2);border-radius:6px;height:10px;margin-top:16px;overflow:hidden}
.master-progress-fill{background:var(--gold);height:100%;border-radius:6px;transition:width 0.5s ease}
.module-section-header{font-size:13px;font-weight:700;color:var(--navy);padding:10px 0 6px;border-bottom:2px solid var(--gold);margin:20px 0 10px;display:flex;justify-content:space-between;align-items:center}
.module-section-header span{font-size:12px;color:var(--text-muted);font-weight:400}
</style>
</head>

      return next;
    });
  }, [key]);
  return [val, set];
}

function ChecklistSection({ items, checked, onToggle, notes, onNote }) {
  const [editingNote, setEditingNote] = useState(null);
  return (
    <div>
      {items.map(item => (
        <div key={item.id} className={`checklist-item${checked[item.id] ? ' checked' : ''}`}>
          <input type="checkbox" checked={!!checked[item.id]} onChange={() => onToggle(item.id)} />
          <div className="checklist-label">
            <strong style={{textDecoration: checked[item.id] ? 'line-through' : 'none', color: checked[item.id] ? 'var(--text-muted)' : 'var(--text)'}}>{item.text}</strong>
            {item.note && <span>{item.note}</span>}
            <button className="checklist-note-btn" onClick={() => setEditingNote(editingNote === item.id ? null : item.id)}>
              {notes[item.id] ? '✎ Edit note' : '+ Add note'}
            </button>
            {editingNote === item.id && (
              <textarea
                className="checklist-note-input"
                value={notes[item.id] || ''}
                onChange={e => onNote(item.id, e.target.value)}
                placeholder="Add your personal note here..."
              />
            )}
            {notes[item.id] && editingNote !== item.id && (
              <div style={{fontSize:12,color:'var(--charcoal)',marginTop:4,fontStyle:'italic',background:'#fffbeb',padding:'4px 8px',borderRadius:4}}>📝 {notes[item.id]}</div>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

function Quiz({ data, quizState, onAnswer, onReset }) {
  if (!data) return null;
  const { answers, submitted } = quizState;
  const score = submitted ? data.questions.reduce((s,q,i) => s + (answers[i] === q.correct ? 1 : 0), 0) : 0;

  return (
    <div className="quiz-card">
      <h3>🧠 {data.title}</h3>
      {data.questions.map((q, qi) => (
        <div className="quiz-q" key={qi}>
          <p>{qi+1}. {q.q}</p>
          {q.opts.map((opt, oi) => {
            let cls = 'quiz-option';
            if (submitted) {
              if (oi === q.correct) cls += ' reveal-correct';
              else if (answers[qi] === oi && oi !== q.correct) cls += ' incorrect';
            } else if (answers[qi] === oi) cls += ' correct';
            return (
              <div key={oi} className={cls} onClick={() => !submitted && onAnswer(qi, oi)}>
                <span style={{fontWeight:600,minWidth:18}}>{String.fromCharCode(65+oi)}.</span> {opt}
              </div>
            );
          })}
          {submitted && (
            <div className={`quiz-feedback ${answers[qi] === q.correct ? 'correct' : 'incorrect'}`}>
              {answers[qi] === q.correct ? '✓ Correct! ' : '✗ Incorrect. '}{q.explain}
            </div>
          )}
        </div>
      ))}
      {!submitted ? (
        <button className="quiz-btn" onClick={() => onAnswer('submit')} disabled={Object.keys(answers).length < data.questions.length}>
          Submit Answers
        </button>
      ) : (
        <div>
          <div className="quiz-score">Score: {score}/{data.questions.length} — {Math.round(score/data.questions.length*100)}%</div>
          <button className="quiz-btn" onClick={onReset} style={{marginTop:10}}>Retake Quiz</button>
        </div>
      )}
    </div>
  );
}

        <h2>What is Government Contracts / Procurement Law?</h2>
        <p>A substantive primer on the GovCon practice area for a licensed Georgia attorney entering the niche for the first time.</p>
      </div>

      <div className="section-label">The Regulatory Framework</div>
      <div className="card">
        <h3><span className="card-icon">📋</span> The FAR: The Starting Point for Everything</h3>
        <p>The <strong>Federal Acquisition Regulation (FAR)</strong>, codified at Title 48 of the Code of Federal Regulations, is the primary rulebook governing how the federal government buys goods and services. It applies to virtually all civilian and defense agencies and covers everything from solicitation and proposal requirements, to contract award, performance, modifications, terminations, and disputes. As a GovCon attorney, you will work in the FAR constantly — it is to government contracts what the UCC is to commercial transactions, but more complex and without as many common-law gap-fillers.</p>
        <p>The FAR is maintained by the FAR Council (a joint DoD/GSA/NASA body) and is available free at <strong>acquisition.gov</strong>. Changes are published in the Federal Register. Staying current on FAR amendments is a basic professional obligation in this practice.</p>
      </div>

      <div className="card">
        <h3><span className="card-icon">🛡️</span> The DFARS: Critical for Georgia's Defense Ecosystem</h3>
        <p>The <strong>Defense Federal Acquisition Regulation Supplement (DFARS)</strong> layers DoD-specific requirements on top of the FAR. For any GovCon practice touching defense contractors — which in Georgia means a large portion of the market — mastery of the DFARS is not optional.</p>
        <p><strong>Why this matters enormously for Georgia practitioners:</strong> Georgia has one of the nation's most significant defense-industrial footprints: Robins Air Force Base (Warner Robins — major sustainment and C2 hub), Fort Eisenhower/Fort Gordon (Augusta — Army Cyber Command, Signal Corps), Hunter Army Airfield (Savannah — 3rd Infantry Division aviation), Naval Submarine Base Kings Bay (Camden County — Atlantic submarine fleet), and the broader Atlanta/Augusta/Savannah defense contractor ecosystem. Your potential clients are prime contractors, subcontractors, and small businesses working on defense programs daily.</p>
        <p><strong>Key DFARS areas to master:</strong></p>
        <ul>
          <li><strong>Cybersecurity / CMMC:</strong> DFARS 252.204-7012 and related clauses impose cybersecurity requirements (safeguarding covered defense information, incident reporting). The Cybersecurity Maturity Model Certification (CMMC) program is a DoD framework requiring contractors to achieve and demonstrate cybersecurity levels as a contract requirement. This is a rapidly growing counseling area. <em>Verify current clause numbers and CMMC rulemaking status against current DFARS text at acquisition.gov — this area has been evolving rapidly.</em></li>
          <li><strong>Clause flow-down obligations:</strong> Prime contractors must flow certain DFARS clauses down to their subcontractors. Counseling subcontractors on which clauses apply to them and what compliance looks like is a major recurring work source.</li>
          <li><strong>Buy American / DFARS sourcing:</strong> DFARS imposes domestic-source requirements (e.g., specialty metals, Berry Amendment) that generate compliance counseling work.</li>
          <li><strong>Small business subcontracting plans:</strong> Large prime contractors are required by DFARS and the FAR to maintain small business subcontracting plans — creating work for attorneys counseling both primes and their small business subs.</li>
        </ul>
      </div>

      <div className="card">
        <h3><span className="card-icon">⚖️</span> What Government Contracts Attorneys Actually Do</h3>
        <p>GovCon law is a broad practice area. The main work streams, each of which can sustain a specialization:</p>
        <ul>
          <li><strong>Bid Protests:</strong> Challenging or defending the award of government contracts at the GAO, the Court of Federal Claims (COFC), or agency level. High deadline pressure; requires deep procedural knowledge.</li>
          <li><strong>Contract Formation/Negotiation:</strong> Reviewing solicitations, advising on proposal strategy, negotiating contract terms (to the extent the FAR allows), and addressing pre-award issues.</li>
          <li><strong>FAR/DFARS Compliance Counseling:</strong> Helping contractors understand and comply with the regulatory obligations built into their contracts — increasingly the bread-and-butter of small-firm GovCon practice.</li>
          <li><strong>Small Business Certifications:</strong> Counseling on 8(a) Business Development Program applications and eligibility, HUBZone certifications, Service-Disabled Veteran-Owned Small Business (SDVOSB/VOSB) self-certification and VA verification, Women-Owned Small Business (WOSB/EDWOSB) certification, and defending against eligibility challenges and protests.</li>
          <li><strong>GSA Schedule Contracts:</strong> Drafting, negotiating, and maintaining Multiple Award Schedule (MAS) contracts — a critical procurement vehicle for many contractors.</li>
          <li><strong>Claims and Disputes (CDA):</strong> Preparing and pursuing contractor claims under the Contract Disputes Act; representing clients before Boards of Contract Appeals (ASBCA, CBCA) and the COFC.</li>
          <li><strong>Suspension & Debarment Defense:</strong> Representing contractors facing suspension or debarment proceedings — a high-stakes, specialized practice with due process dimensions.</li>
          <li><strong>Subcontracting/Teaming Agreements:</strong> Drafting and negotiating teaming agreements for pursuing work and subcontract agreements for performance.</li>
          <li><strong>Mergers & Acquisitions Due Diligence:</strong> Government-contract-specific M&A diligence — novation requirements, change-of-control restrictions, security clearance implications.</li>
          <li><strong>False Claims Act / Qui Tam Defense:</strong> Defending contractors against FCA allegations (civil), counseling on mandatory disclosure obligations, and addressing qui tam suits — a high-risk, high-expertise area.</li>
          <li><strong>Security Clearance Issues:</strong> Advising on facility clearance (FCL) and personnel security clearance (PCL) matters in the context of contract performance.</li>
          <li><strong>State & Local Procurement:</strong> Georgia has its own procurement code (O.C.G.A. Title 50, Chapter 5 — Georgia Procurement Code; administered in part by DOAS — the Department of Administrative Services). State and local procurement is a distinct body of law from federal procurement, and many small firms choose to serve clients in both.</li>
          <li><strong>Cybersecurity Compliance (CMMC):</strong> An emerging practice area advising defense contractors on achieving and maintaining CMMC compliance as a contract requirement.</li>
        </ul>
      </div>

      <div className="card">
        <h3><span className="card-icon">🗺️</span> Federal vs. Georgia State/Local Procurement: Two Different Bodies of Law</h3>
        <p>A critical threshold distinction: <strong>federal procurement law</strong> (FAR, DFARS, Contract Disputes Act, Small Business Act, etc.) and <strong>Georgia state/local procurement law</strong> (Georgia Procurement Code, O.C.G.A. Title 50, Chapter 5; Georgia Procurement Registry operated by DOAS; county and municipal procurement rules) are <em>distinct bodies of law</em> with different rules, forums, and practitioners.</p>
        <p><strong>Federal procurement</strong> is governed by federal statute and regulation, applies to contracts with federal agencies, and disputes are resolved in the GAO, federal boards of contract appeals, the Court of Federal Claims, and the Federal Circuit. The Federal Acquisition Regulation is the core source.</p>
        <p><strong>Georgia state procurement</strong> is governed primarily by <strong>O.C.G.A. § 50-5-50</strong> (the State Procurement Act) and administered by the <strong>Georgia Department of Administrative Services (DOAS)</strong>. DOAS has promulgated the <em>Georgia Procurement Manual</em>, which sets out the rules, procedures, and contract templates for state agency procurement — the first thing to read for any Georgia state contracting matter. Start there and at § 50-5-50; together they cover 95% of issues you will encounter.<br/><br/>
        <strong>Agencies outside DOAS:</strong> Not all state agencies fall under DOAS. Three important exceptions: the Georgia Department of Transportation (GDOT), the University System of Georgia (USG), and the Georgia Technology Authority (GTA) each operate under their own procurement rules. Always confirm which procurement framework applies before advising a client.<br/><br/>
        <strong>Bid protest process in Georgia:</strong> Similar to the federal system, Georgia agencies issue a notice of intent to award that identifies the winner, the other bidders, and (ideally) why unsuccessful bidders were not selected. This notice starts the clock: you have <strong>10 calendar days</strong> from the notice of intent to award to file a bid protest with DOAS. If you receive an unfavorable ruling from DOAS, you may appeal further. Missing the 10-day deadline generally waives the protest.<br/><br/>
        <strong>Open Records Act trap:</strong> Georgia's Open Records Act (O.C.G.A. § 50-18-70 et seq.) is its state equivalent of FOIA — and contractors routinely overlook it. A competitor can request your client's submitted proposal, pricing data, and financial information through an ORA request. Most solicitations give a mechanism to designate confidential financial/pricing data, but contractors miss it. Counsel clients to make proper confidentiality designations at submission time — not after the award — or their pricing and cost structure become public record available to every future competitor.<br/><br/>
        County and municipal procurement adds further complexity: each jurisdiction may have its own ordinances, procedures, and timelines, which vary far more widely than federal rules. State bid protest timelines can range from 3 days to a month depending on agency — always verify before advising.</p>
        <p>Your firm can choose to specialize in one, the other, or both. Many Georgia GovCon firms focus primarily on federal work given the size of the federal market, but state/local procurement work can be a significant complementary practice — especially for smaller contractors who primarily work with state agencies, cities, counties, school districts, and authorities.</p>
      </div>

      <div className="section-label">Key Reading & Sources</div>

      <SourceItem title="Nash & Cibinic Report" desc="Leading GovCon law treatise/newsletter. Thomson Reuters. Expensive but the gold standard for practitioners. Available in many law school libraries." where="Westlaw / law library — Thomson Reuters" />
      <SourceItem title="Ralph C. Nash & John Cibinic, Formation of Government Contracts (4th ed.)" desc="Foundational treatise on government contract formation. Read the relevant chapters before advising on any contract formation issues." where="Law library / George Washington University Law School publications" />

        <h3><span className="card-icon">🏢</span> Entity Choice for a Georgia Law Firm</h3>
        <p>When you go from associate/employed attorney to law firm owner, one of the first decisions is the legal structure of your practice. Georgia has specific rules about what entities are permissible for law practice — rules that differ from the general business world.</p>
        <p><strong>Professional Corporation (PC):</strong> Traditionally the entity of choice for solo practitioners and small firms in Georgia. A PC is incorporated under Georgia's professional corporation statutes and provides liability protection (with exceptions for professional malpractice) and a clear structure for ownership by attorneys. Historically, Georgia law required attorneys to use a PC rather than a standard LLC for law practice — verify the current rule with the State Bar.</p>
        <p><strong>LLC / Professional LLC:</strong> Some states permit attorneys to practice in an LLC or PLLC. The permissibility and mechanics of this in Georgia have been the subject of ethics opinions — <strong>confirm directly with the State Bar of Georgia's Office of the General Counsel</strong> before forming an LLC for law practice. Do not rely on general Georgia LLC statutes alone.</p>
        <p><strong>Sole Proprietorship:</strong> Simplest structure; no entity formation required. You practice as an individual. Provides no liability separation. Fine for very early stage, but most practitioners migrate to a PC or other entity quickly.</p>
        <p><strong>Key tradeoffs (general education only — not tax or legal advice):</strong> A PC offers some liability separation and can have tax advantages (S-corp election) but involves more administrative overhead. A sole proprietorship is simpler but offers no liability shield. Whatever you choose, the cost of a conversation with a Georgia business attorney and a CPA before forming your entity is well worth it.</p>
      </div>

      <div className="card">
        <h3><span className="card-icon">🏦</span> IOLTA Trust Accounts: Your Most Critical Compliance Obligation</h3>
        <p>If you have not previously been personally responsible for a client trust account, this will be one of the most important new operational obligations you take on. The <strong>Georgia Rules of Professional Conduct</strong> (Rule 1.15) govern how client funds must be handled, and the Georgia Bar Foundation administers the <strong>IOLTA (Interest on Lawyers' Trust Accounts)</strong> program.</p>
        <p><strong>Key obligations:</strong></p>
        <ul>
          <li>Client funds must be kept in a separate, FDIC-insured trust account — never commingled with your operating funds.</li>
          <li>IOLTA accounts pay interest to the Georgia Bar Foundation (for legal aid) rather than to you.</li>
          <li>You must maintain detailed records of all trust account deposits and disbursements — who the funds belong to, in what amount, and when disbursed.</li>
          <li>Trust account recordkeeping violations are among the most common sources of Georgia Bar discipline. Take this seriously from Day 1.</li>
        </ul>
        <p>In a GovCon practice, trust account issues can arise with advance payments, retainers, and settlement funds from contract disputes. Establish your trust accounting systems before accepting your first client.</p>
        <p><em>Verify current IOLTA requirements at the Georgia Bar Foundation website and State Bar of Georgia's trust accounting guidance.</em></p>
      </div>

      <div className="card">
        <h3><span className="card-icon">🛡️</span> Malpractice (E&O) Insurance</h3>
        <p>Georgia does not currently mandate malpractice insurance as a condition of bar membership (verify this is still true with the State Bar). However, practicing without it — especially in GovCon — is a serious risk you should think hard about before accepting any clients.</p>
        <p><strong>Why GovCon elevates malpractice risk:</strong></p>
        <ul>
          <li><strong>Strict, unforgiving deadlines:</strong> Missing a GAO bid protest deadline (generally 10 days) can permanently bar your client from relief. Missing a CDA appeal deadline can extinguish a claim. These are the kinds of errors that generate malpractice suits.</li>
          <li><strong>High contract values:</strong> Your clients may have contracts worth millions or tens of millions of dollars. Damages calculations in GovCon malpractice claims can be very large.</li>
          <li><strong>Sophisticated clients:</strong> Defense contractors and commercial GovCon businesses often have in-house counsel or board oversight. They know when something goes wrong.</li>
        </ul>
        <p>Get malpractice insurance before you accept your first GovCon client. Look for carriers that specifically cover government contracts practice and understand the deadline-driven nature of the work. Verify that your policy covers the specific work you do.</p>
      </div>

      <div className="card">
        <h3><span className="card-icon">📢</span> Marketing & Advertising Rules</h3>
        <p>The Georgia Rules of Professional Conduct (Rules 7.1–7.5) regulate attorney advertising and solicitation. Key considerations for a GovCon boutique:</p>
        <ul>
          <li><strong>Claims of specialization:</strong> Rule 7.4 addresses claims of specialization. Generally, you may state that you practice in government contracts or focus on GovCon law, but you should be cautious about claiming to be a "specialist" or "expert" without understanding the current rule requirements. Verify current Rule 7.4 language with the State Bar.</li>
          <li><strong>Firm name:</strong> Using "government contracts" or similar in your firm name is generally acceptable as a description of practice area, but verify any specific limitations under the Rules and State Bar guidance.</li>
          <li><strong>Testimonials and endorsements:</strong> The Rules have requirements and restrictions on client testimonials in advertising — review before posting on your website or LinkedIn.</li>
          <li><strong>Direct solicitation:</strong> In-person or live telephone solicitation of prospective clients is restricted. Written, email, or digital marketing is subject to labeling requirements. Referral relationships with PTACs and other organizations (which refer, not solicit for you) are generally not implicated.</li>
        </ul>
        <p><em>Before publishing your website, LinkedIn profile, or any marketing materials, review them against the current Georgia Rules of Professional Conduct (Rules 7.1–7.5) and any State Bar guidance or formal ethics opinions on attorney advertising.</em></p>
      </div>

      <div className="card">
        <h3><span className="card-icon">🚪</span> Departure Logistics (If Leaving a Current Firm)</h3>
        <p>If you are transitioning from an existing employer to your own firm, you have important ethical obligations to navigate:</p>
        <ul>
          <li><strong>Client notice:</strong> Clients you currently serve have the right to know you are leaving and to choose whether to follow you or remain with the firm. The mechanics of how and when to give notice are governed by Georgia ethics rules and any employment agreement — get this right before you leave.</li>
          <li><strong>Conflicts clearance:</strong> You need to identify which matters you may take with you and run conflicts against your new firm's potential client base before accepting any new engagements.</li>
          <li><strong>File transfer:</strong> You have obligations regarding client files. The client owns the file contents. Understand the rules on what you can take, what the firm must provide, and when.</li>
          <li><strong>Employment agreement review:</strong> Non-compete clauses are generally not enforceable against attorneys in Georgia (ethics rules generally preempt them in the law firm context), but your agreement may have other obligations worth reviewing with a lawyer before you depart.</li>
          <li><strong>GovCon-specific issue:</strong> If your prior firm represents any government contractors, you will need a careful conflicts analysis before representing any competing contractors or the government. The teaming and competition dynamics in GovCon make conflicts particularly intricate.</li>
        </ul>
      </div>

        <h2>Building GovCon Subject-Matter Competency</h2>

      </div>

      <Alert type="info">

      <div className="card">
        <h3><span className="card-icon">📚</span> The Core Sources to Master</h3>
        <p><strong>1. The FAR (Federal Acquisition Regulation)</strong><br/>
        You must know the FAR's structure. It is organized in parts (1–53) covering the full acquisition lifecycle. Key parts to start with: Part 1 (purpose and authority), Part 9 (contractor qualifications and debarment/suspension), Part 15 (contracting by negotiation — proposal rules), Part 19 (small business), Part 31 (contract cost principles), Part 33 (protests and disputes), and Part 52 (contract clauses). Read these parts, then expand.</p>

        <p><strong>3. SBA Regulations — 13 C.F.R.</strong><br/>
        Part 121 (size standards), Part 124 (8(a)), Part 125 (SDVOSB/VOSB, WOSB/EDWOSB, government contracting programs generally), Part 126 (HUBZone). These are the primary source for small business certification work, which is often the most accessible starting lane for a new GovCon practice.</p>
        <p><strong>4. Contract Disputes Act (CDA)</strong><br/>
        41 U.S.C. §§ 7101–7109. Read the statute, then read the Board and COFC decisions interpreting it. Understand certified claims, contractor certification requirements, and the 6-year statute of limitations.</p>
        <p><strong>5. False Claims Act</strong><br/>
        31 U.S.C. §§ 3729–3733. Even if you never take an FCA case, your clients face FCA risk in compliance representations. You must understand the basic elements, the qui tam mechanism, mandatory disclosure obligations (FAR 52.203-13), and the civil penalty exposure.</p>
        <p><strong>6. Small Business Act</strong><br/>
        15 U.S.C. § 631 et seq. The statutory authority underlying most small business contracting programs. Read in conjunction with 13 C.F.R.</p>
      </div>

      <div className="card" style={{background:'#f8f9ff',borderColor:'#c8d0e8'}}>
        <h3><span className="card-icon">⚖️</span> Foundational Doctrines Every GovCon Attorney Must Know</h3>
        <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:14}}>Sourced from a 2026 Georgia Bar Construction Law Section CLE, "Introduction to Government Contracting" (Hudson-Lambert Parrott). These are the doctrines that most distinguish government contracts practice from ordinary commercial contract work — internalize them before your first client meeting.</p>
        <p><strong>The Christian Doctrine (G.L. Christian &amp; Assocs. v. United States, 1963)</strong><br/>
        Certain FAR/agency-mandated clauses are read INTO a government contract by operation of law, even if the parties never wrote them into the signed document — and even if the omission was a pure drafting accident. In the seminal case, the government omitted the standard Termination for Convenience clause from a military housing contract, then invoked it anyway. The contractor argued the clause didn't exist in their contract; the Court of Claims held it was implied by law because it reflected a deeply ingrained, mandatory procurement policy. <strong>Practical consequence:</strong> you cannot rely on the four corners of a government contract the way you would a commercial agreement. There is no master list of "Christian Doctrine clauses" — which clauses are mandatory-by-implication is contract-type- and agency-specific and requires checking the applicable FAR/DFARS coverage matrix for that procurement.</p>
        <p><strong>The Merrill / Actual Authority Doctrine (Federal Crop Ins. Corp. v. Merrill, 1947)</strong><br/>
        Unlike commercial law, apparent authority does not bind the federal government — only ACTUAL authority granted by statute or regulation does. In Merrill, a federal crop insurance agent told a farmer his reseeded wheat crop was covered; the agency issued the policy; the crop failed; and the government then denied the claim because its own regulations never permitted coverage of reseeded crops in the first place. SCOTUS held the government was not bound by its own agent's mistaken assurance, and that the farmer was on constructive notice of the published regulation whether or not he'd read it. <strong>Practical consequence:</strong> only the Contracting Officer (CO) — and, if written delegation exists, an Administrative Contracting Officer (ACO) — can bind the government. A Contracting Officer's Representative (COR), who is often the only government person a contractor deals with day-to-day in the field, generally CANNOT direct changes, authorize extra work, or modify terms. Verbal "direction" from a COR that increases cost or time is a classic trap — confirm in writing and route it to the CO before performing, or you may have performed unauthorized work with no right to payment.</p>
        <p><strong>Organizational Conflict of Interest — OCI (Aetna Gov't Health Plans, Inc. v. United States, Fed. Cl. 1995-97; FAR Subpart 9.5)</strong><br/>
        OCI analysis asks whether a contractor's other roles create unequal access to information, biased ground rules, or impaired objectivity relative to a procurement — colloquially, "you can't grade your own homework." Common fact pattern: an agency pays a small contractor to study and recommend how a larger project should be built, then opens that larger project to competition — the study contractor now has an unfair head start and may have helped write its own specifications. <strong>Critical point:</strong> OCI is evaluated objectively. The government does not need to prove an actual conflict occurred or that anyone acted in bad faith — the mere appearance of an unmitigated structural conflict is enough to disqualify a bid or sustain a competitor's protest. Counsel clients early whenever they perform advisory, requirements-development, or evaluation-support work for an agency that might later compete the resulting project.</p>
        <p><strong>Termination for Convenience</strong><br/>
        One of the federal government's most powerful contractual rights, implied into virtually every FAR-based contract (often via the Christian Doctrine where omitted): the government may terminate a contract at any time simply because doing so serves the government's interest — no breach or default by the contractor required. The contractor's remedy is not breach damages but a termination settlement under FAR Part 49 (costs incurred, an allocable share of overhead, and reasonable profit on work performed — not lost profit on unperformed work). Counsel clients up front that "termination for convenience" exposure is a baseline business risk of all federal contracting, not an edge case.<br/><br/>
        <em>Kregowski Construction Co. (bad faith standard):</em> To successfully challenge a TFC as improper, the contractor must prove the government acted in bad faith — an extremely high bar. There is a strong presumption that government officials act in good faith, and courts have upheld TFCs triggered by: changed strategic priorities, revised procurement vehicles, re-evaluation of agency needs, or a decision to set aside work for small businesses. In Kregowski, the Army Corps of Engineers terminated an asbestos-removal contract after award, stating the work would better fit a small business set-aside vehicle. The contractor argued bad faith because the agency should have known the set-aside policy from the start. The court disagreed — changed circumstances and revised procurement strategies can justify TFC without bad faith. <strong>Practice point:</strong> if a client believes a TFC was pretextual or retaliatory, counsel must gather affirmative evidence of improper motive; mere dissatisfaction with the government's reasoning is insufficient. Document retention from day one is critical — it is the contractor's only tool for building a bad faith record.</p>
        <p><strong>Pre-Award Practice Tip: The Compliance Matrix</strong><br/>
        Before any client bids on a solicitation, build a compliance matrix — a working document that walks the full RFP/RFQ/IFB line-by-line and flags every clause, certification, and incorporated regulation the client must satisfy (e.g., Davis-Bacon Act prevailing wage requirements, CMMC cybersecurity level, small business size/socioeconomic certifications, bonding requirements, FOIA/confidentiality designations for pricing and financial data). It is tedious, but it surfaces "showstopper" requirements — like a Davis-Bacon obligation a client cannot meet — before they waste resources on a doomed proposal. It also becomes the backbone of your post-award compliance file.</p>
      </div>

      <div className="card">
        <h3><span className="card-icon">🎓</span> CLE and Professional Development</h3>
        <p><strong>ABA Public Contract Law Section (ABA PCL):</strong> This is the premier national organization for government contracts lawyers. Membership gives access to the Public Contract Law Journal, the Briefing Papers series, CLE programs, and a national practitioner network. Join early — even before you feel ready to contribute. The annual spring meeting is one of the best networking and education events in the space. See <em>americanbar.org</em>.</p>
        <p><strong>Georgia Bar Government and Public Sector Lawyers Section:</strong> Check the State Bar of Georgia's section listings for any section relevant to government practice. This may be the most direct way to connect with other Georgia government-focused practitioners. Verify current section offerings at <em>gabar.org</em>.</p>
        <p><strong>National Contract Management Association (NCMA):</strong> NCMA is primarily a certifying and professional organization for contract managers and contracting officers — not a bar organization. However, attorneys who obtain NCMA's Certified Professional Contract Manager (CPCM) or Certified Federal Contracts Manager (CFCM) designations gain credibility with contractor clients who think in these terms. Consider whether this investment is right for your practice. See <em>ncmahq.org</em>.</p>
        <p><strong>West Government Contracts (Westlaw) and Bloomberg Law GovCon:</strong> These are the primary research platforms. Make sure your subscription covers FAR/DFARS annotations, Board/COFC decisions, and GAO bid protest decisions. CaseMaker (available to Georgia Bar members — verify current availability) may also provide some coverage.</p>
        <p><strong>George Washington University Law School GovCon Programs:</strong> GWU Law has historically had a strong government contracts program with practitioners as faculty. Check their CLE and online offerings for substantive deep dives.</p>
      </div>

      <div className="card">
        <h3><span className="card-icon">📰</span> Ongoing Competency: The Reading Habit</h3>
        <p>Unlike most practice areas, GovCon has a rich body of public, freely-available decision law that you can use to build competency rapidly:</p>
        <ul>
          <li><strong>GAO Bid Protest Decisions:</strong> GAO issues hundreds of decisions per year. Set aside time weekly to read decisions in your focus areas. They are free at <em>gao.gov/legal/bid-protests/recent-decisions</em>. Reading them regularly is the single best ongoing competency-building habit in this practice area.</li>
          <li><strong>COFC Procurement Decisions:</strong> Free at <em>uscfc.uscourts.gov</em>. More formal than GAO; covers larger matters and appeals from agency-level protests.</li>
          <li><strong>ASBCA and CBCA Decisions:</strong> Published and freely available at each board's website. Essential if you intend to do CDA claims work.</li>
          <li><strong>SBA Office of Hearings and Appeals (OHA) Decisions:</strong> Published free at <em>sba.gov/oha</em> — cover size determination protests, 8(a) eligibility, and SDVOSB/WOSB certification disputes. Essential for certification counseling work.</li>
          <li><strong>Federal Register:</strong> Subscribe to FAR/DFARS proposed and final rule notifications. The GovCon regulatory environment is constantly evolving — staying current is a professional obligation.</li>
        </ul>
      </div>

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?count=10&rss_url=';
const FEDREG_API = 'https://www.federalregister.gov/api/v1/articles?fields[]=title&fields[]=abstract&fields[]=html_url&fields[]=publication_date&fields[]=type&per_page=10&order=newest&agencies[]=defense-acquisition-regulations-system&agencies[]=general-services-administration&agencies[]=small-business-administration&agencies[]=office-of-federal-procurement-policy';

function useNewsFeed(feed) {
  const [items, setItems] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [lastFetched, setLastFetched] = React.useState(null);

  const fetch_ = React.useCallback(async () => {
    const cacheKey = `news_${feed.id}`;
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      try {
        const { data, ts } = JSON.parse(cached);
        if (Date.now() - ts < 30 * 60 * 1000) {
          setItems(data); setLastFetched(new Date(ts)); return;
        }
      } catch(e) {}
    }
    setLoading(true); setError(null);
    try {
      let results = [];
      if (feed.type === 'fedreg') {
        const r = await fetch(FEDREG_API);
        const d = await r.json();
        results = (d.results || []).map(a => ({
          title: a.title,
          description: a.abstract || 'Federal Register notice.',
          link: a.html_url,
          pubDate: a.publication_date,
          source: 'Federal Register',
          type: a.type,
        }));
      } else {
        const r = await fetch(RSS2JSON + encodeURIComponent(feed.rss));
        const d = await r.json();
        results = (d.items || []).map(i => ({
          title: i.title.replace(/ - .*$/, ''),
          description: i.description ? i.description.replace(/<[^>]+>/g,'').substring(0,200) : '',
          link: i.link,
          pubDate: i.pubDate,
          source: i.author || new URL(i.link).hostname.replace('www.',''),
        }));
      }
      setItems(results);
      setLastFetched(new Date());
      sessionStorage.setItem(cacheKey, JSON.stringify({ data: results, ts: Date.now() }));
    } catch(e) {
      setError('Could not load feed. Check your internet connection.');
    }
    setLoading(false);
  }, [feed.id]);

  React.useEffect(() => { fetch_(); }, [feed.id]);
  return { items, loading, error, refresh: fetch_, lastFetched };
}

function NewsPanel({ feed }) {
  const { items, loading, error, refresh, lastFetched } = useNewsFeed(feed);

  const timeAgo = (dateStr) => {
    try {
      const diff = Date.now() - new Date(dateStr).getTime();
      const h = Math.floor(diff / 3600000);
      if (h < 1) return 'Just now';
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h/24)}d ago`;
    } catch(e) { return ''; }
  };

  if (loading) return (
    <div style={{padding:'40px 0',textAlign:'center'}}>
      <div style={{color:'var(--text-muted)',fontSize:14}}>Loading {feed.label}…</div>
      <div style={{marginTop:8,color:'var(--text-muted)',fontSize:12}}>Fetching live stories</div>
    </div>
  );

  if (error) return (
    <div style={{padding:'30px 20px',textAlign:'center',background:'#fff7ed',borderRadius:8,border:'1px solid #fed7aa'}}>
      <div style={{fontSize:24,marginBottom:8}}>⚠️</div>
      <div style={{color:'#9a3412',fontSize:14,fontWeight:600,marginBottom:6}}>{error}</div>
      <div style={{color:'#9a3412',fontSize:12,marginBottom:12}}>This feature requires an internet connection. The RSS proxy may also be temporarily unavailable.</div>
      <button onClick={refresh} style={{background:'#ea580c',color:'white',border:'none',borderRadius:6,padding:'8px 16px',fontSize:12,fontWeight:700,cursor:'pointer'}}>Try Again</button>
    </div>
  );

  if (!items || items.length === 0) return (
    <div style={{padding:'30px',textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No stories found for this feed right now.</div>
  );

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{color:'var(--text-muted)',fontSize:12}}>
          {lastFetched && `Updated ${lastFetched.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} · ${items.length} stories`}
        </div>
        <button onClick={refresh} style={{background:'none',border:'1px solid var(--border)',borderRadius:5,padding:'5px 12px',fontSize:11,fontWeight:600,cursor:'pointer',color:'var(--charcoal)'}}>

        </button>
      </div>
      <div style={{display:'grid',gap:10}}>
        {items.map((item, i) => (
          <a key={i} href={item.link} target="_blank" rel="noopener noreferrer"
            style={{display:'block',textDecoration:'none',background:'white',border:'1px solid var(--border)',borderRadius:8,padding:'14px 16px',borderLeft:`4px solid ${feed.color}`,transition:'box-shadow 0.15s'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:'var(--navy)',lineHeight:1.4,marginBottom:5}}>{item.title}</div>
                {item.description && <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.55}}>{item.description.substring(0,180)}{item.description.length>180?'…':''}</div>}
              </div>
              <span style={{color:'var(--gold)',fontSize:12,flexShrink:0}}>→</span>
            </div>
            <div style={{display:'flex',gap:10,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
              {item.source && <span style={{background:'#f1f5f9',color:'var(--text-muted)',fontSize:11,fontWeight:600,padding:'2px 7px',borderRadius:3}}>{item.source}</span>}
              {item.type && <span style={{background:`${feed.color}18`,color:feed.color,fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:3}}>{item.type}</span>}
              {item.pubDate && <span style={{color:'var(--text-muted)',fontSize:11}}>{timeAgo(item.pubDate)}</span>}
            </div>
